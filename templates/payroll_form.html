{% extends 'base.html' %}
{% block content %}
<div class="content-container" style="max-width: 900px; margin-top: 40px;">
    <div style="background: white; padding: 40px; border-radius: 0; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        <h2 style="margin-top:0; color:#111; font-weight: 800;"><i class="fa-solid fa-envelope-open-text"></i> 스마트 명세서 발송 시스템</h2>
        <p style="color: #666; font-size: 0.9rem;">대상별(강사/직원) 자동 분류, 엑셀 다중 탭 자동 인식 및 광고 삽입 발송을 지원합니다.</p>
        <hr style="border:0; border-top:1px solid #eee; margin: 30px 0;">

        <form id="payroll-form" enctype="multipart/form-data">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px;">
                <div>
                    <label style="font-weight: bold; display: block; margin-bottom: 10px; font-size: 0.9rem;">지급 날짜</label>
                    <input type="date" id="send_date" name="send_date" class="form-control" required style="width:100%; padding:12px; border:1px solid #ddd; outline: none;">
                </div>
                <div>
                    <label style="font-weight: bold; display: block; margin-bottom: 10px; font-size: 0.9rem;">발송 간격 (초)</label>
                    <input type="number" name="interval" value="2" step="0.5" min="0.5" class="form-control" style="width:100%; padding:12px; border:1px solid #ddd; outline: none;">
                    <small style="color: #888;">* 구글 스팸 방지를 위해 2초 이상을 권장합니다.</small>
                </div>
            </div>

            <div style="margin-bottom: 30px;">
                <label style="font-weight: bold; display: block; margin-bottom: 10px; font-size: 0.9rem;">명세서 엑셀 파일 (.xlsx)</label>
                <input type="file" name="excel" id="excel" accept=".xlsx" required style="width:100%; padding:15px; border: 2px dashed #eee; cursor: pointer;">
                <small style="color:#2c7be5; font-weight:bold; display:block; margin-top:5px;">* 여러 시트가 있어도 자동으로 '이메일' 항목(3행 기준)이 있는 시트를 찾아냅니다.</small>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 35px;">
                <div>
                    <label style="font-weight:bold; display: block; margin-bottom: 10px;">광고 이미지 1</label>
                    <input type="file" name="ad1" id="ad1" accept="image/*" onchange="previewImg(this, 'p1')">
                    <div id="p1" style="margin-top:10px; width:100%; height:120px; border:1px solid #eee; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#fafafa;">
                        <span style="color:#ccc; font-size:0.8rem;">미리보기 없음</span>
                    </div>
                </div>
                <div>
                    <label style="font-weight:bold; display: block; margin-bottom: 10px;">광고 이미지 2</label>
                    <input type="file" name="ad2" id="ad2" accept="image/*" onchange="previewImg(this, 'p2')">
                    <div id="p2" style="margin-top:10px; width:100%; height:120px; border:1px solid #eee; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#fafafa;">
                        <span style="color:#ccc; font-size:0.8rem;">미리보기 없음</span>
                    </div>
                </div>
            </div>

            <button type="submit" id="submit-btn" style="width:100%; background:#111; color:white; border:none; padding:18px; font-weight:bold; font-size:1.1rem; cursor:pointer; transition: 0.3s;">
                <i class="fa-solid fa-paper-plane"></i> 명세서 발송 시작하기
            </button>
        </form>

        <div id="status-panel" style="display:none; margin-top:40px; padding:25px; background:#f9f9f9; border:1px solid #eee; border-radius:10px;">
            <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom:15px;">
                <span id="status-text" style="font-weight:bold; color:#111; font-size: 1.1rem;">🚀 발송 준비 중...</span>
                <span id="progress-percent" style="font-weight: 800; color: #4a90e2; font-size: 1.2rem;">0%</span>
            </div>
            
            <div style="width: 100%; background-color: #e0e0e0; height: 8px; border-radius: 4px; margin-bottom: 15px; overflow: hidden;">
                <div id="progress-bar-fill" style="width: 0%; height: 100%; background-color: #4a90e2; transition: width 0.5s ease;"></div>
            </div>

            <div style="width:100%; height:250px; overflow-y:auto; border:1px solid #eee; background:white; padding:15px; font-size:0.95rem; line-height: 1.8;" id="name-list">
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const today = new Date().toISOString().split('T')[0];
    const dateInput = document.getElementById('send_date');
    if(dateInput) dateInput.value = today;
});

function previewImg(input, targetId) {
    const target = document.getElementById(targetId);
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            target.innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:contain;">`;
        };
        reader.readAsDataURL(input.files[0]);
    } else {
        target.innerHTML = '<span style="color:#ccc; font-size:0.8rem;">미리보기 없음</span>';
    }
}

document.getElementById('payroll-form').addEventListener('submit', async function(e) {
    e.preventDefault(); 
    
    if(!confirm("명세서 발송을 시작하시겠습니까? (창을 닫거나 새로고침하지 마세요)")) return;

    const formData = new FormData(this);
    const submitBtn = document.getElementById('submit-btn');
    const panel = document.getElementById('status-panel');
    const nameList = document.getElementById('name-list');
    
    // UI 초기화 세팅
    submitBtn.disabled = true;
    submitBtn.style.background = "#ccc";
    panel.style.display = 'block';
    nameList.innerHTML = "<div style='color:#666;'>서버에 발송을 요청하고 있습니다...</div>";
    document.getElementById('status-text').innerText = "⏳ 데이터 분석 중...";
    document.getElementById('progress-percent').innerText = "0%";
    document.getElementById('progress-bar-fill').style.width = "0%";

    try {
        const res = await fetch('/payroll/send', { method: 'POST', body: formData });
        const result = await res.json();
        
        if(result.status === 'error') {
            alert(result.message);
            submitBtn.disabled = false;
            submitBtn.style.background = "#111";
            panel.style.display = 'none';
            return;
        }

        document.getElementById('status-text').innerText = "🚀 명세서 발송 진행 중...";

        // 1.5초마다 상태 체크
        const checkInterval = setInterval(async () => {
            try {
                const statusRes = await fetch('/payroll/status');
                const data = await statusRes.json();
                
                if (data.total_count > 0) {
                    const percent = Math.round((data.processed_count / data.total_count) * 100);
                    
                    document.getElementById('progress-percent').innerText = `${percent}% (${data.processed_count}/${data.total_count})`;
                    document.getElementById('progress-bar-fill').style.width = `${percent}%`;
                    
                    if (data.sent_names.length > 0) {
                        nameList.innerHTML = data.sent_names.map(name => 
                            `<div style="border-bottom:1px solid #f5f5f5; padding:5px 0;"><i class="fa-solid fa-check" style="color:green;"></i> <b>${name}</b>님께 발송 성공</div>`
                        ).join('');
                    }
                    
                    nameList.scrollTop = nameList.scrollHeight; // 자동 스크롤
                }

                // [핵심] is_running이 False가 되면 발송이 완전히 종료된 것임
                if (!data.is_running && data.total_count > 0 && data.processed_count >= data.total_count) {
                    clearInterval(checkInterval);
                    showCompletionReport(data); // 상세 리포트 렌더링 함수 호출
                    submitBtn.disabled = false;
                    submitBtn.style.background = "#111";
                }
            } catch (err) {
                console.error("상태 확인 중 오류:", err);
            }
        }, 1500);

    } catch (err) {
        alert("서버 통신 중 오류가 발생했습니다.");
        submitBtn.disabled = false;
        submitBtn.style.background = "#111";
        panel.style.display = 'none';
    }
});

// 발송 완료 후 리포트를 그려주는 전용 함수
function showCompletionReport(data) {
    document.getElementById('status-text').innerText = "✅ 발송 완료 리포트";
    document.getElementById('progress-bar-fill').style.backgroundColor = "#28a745"; // 초록색 변경
    
    let errorHtml = '';
    if (data.errors.length > 0) {
        errorHtml = `<div style="margin-top:15px; padding:15px; background:#fff5f5; border-left:4px solid #e53e3e; border-radius:4px;">
                        <b style="color:#e53e3e; display:block; margin-bottom:8px;"><i class="fa-solid fa-triangle-exclamation"></i> 발송 실패 내역 (${data.errors.length}건)</b>
                        <div style="color:#c53030;">${data.errors.join('<br>')}</div>
                     </div>`;
    } else {
        errorHtml = `<div style="margin-top:15px; padding:10px; color:#2f855a; font-weight:bold;"><i class="fa-solid fa-face-smile"></i> 실패한 내역이 없이 모두 전송되었습니다.</div>`;
    }

    const reportHtml = `
        <div style="background:#f0f4f8; padding:20px; border-radius:8px; margin-bottom:20px; text-align:center;">
            <h3 style="margin:0; color:#1a202c;">총 발송 대상 : <span style="color:#4a90e2;">${data.total_count}</span>명</h3>
            <p style="margin:10px 0 0 0; font-size:1.1rem;">
                <span style="color:green; font-weight:bold;">성공 ${data.sent_count}건</span> / 
                <span style="color:#e53e3e; font-weight:bold;">실패 ${data.errors.length}건</span>
            </p>
        </div>
        ${errorHtml}
        <h4 style="margin: 20px 0 10px 0; border-bottom: 2px solid #eee; padding-bottom: 5px;"><i class="fa-solid fa-list-check"></i> 성공 명단 리스트</h4>
        <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px;">
            ${data.sent_names.map(name => `<div style="background:#f8f9fa; padding:8px; border-radius:5px; text-align:center; font-size:0.9rem; border:1px solid #e2e8f0;">${name}</div>`).join('')}
        </div>
    `;
    
    document.getElementById('name-list').innerHTML = reportHtml;
}
</script>
{% endblock %}
