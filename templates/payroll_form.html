{% extends 'base.html' %}
{% block content %}
<div class="content-container" style="max-width: 800px; margin-top: 40px;">
    <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        <h2 style="margin-top:0; color:#1f3c88;"><i class="fa-solid fa-envelope-open-text"></i> 스마트 명세서 발송 시스템</h2>
        <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">

        <form id="payroll-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;">지급 날짜</label>
                    <input type="date" id="send_date" name="send_date" class="form-control" required style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;">
                </div>
                <div>
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;">발송 간격 (초)</label>
                    <input type="number" name="interval" value="2" step="0.5" class="form-control" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;">
                    <small style="color: #888;">* 구글 스팸방지를 위해 2초 이상 권장</small>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-weight: bold; display: block; margin-bottom: 8px;">명세서 엑셀 파일</label>
                <input type="file" name="excel" accept=".xlsx" required style="width:100%; padding:10px; border: 1px dashed #4a90e2; border-radius:10px;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                <div><label style="font-weight:bold;">광고이미지 1</label><input type="file" name="ad1" accept="image/*"></div>
                <div><label style="font-weight:bold;">광고이미지 2</label><input type="file" name="ad2" accept="image/*"></div>
            </div>

            <button type="submit" id="submit-btn" style="width:100%; background:#1f3c88; color:white; border:none; padding:15px; border-radius:15px; font-weight:bold; cursor:pointer;">
                <i class="fa-solid fa-paper-plane"></i> 발송 시작하기
            </button>
        </form>

        <div id="status-panel" style="display:none; margin-top:30px; padding:20px; background:#f8f9fa; border-radius:15px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span id="status-text" style="font-weight:bold; color:#4a90e2;">준비 중...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div style="width:100%; height:100px; overflow-y:auto; border:1px solid #ddd; background:white; padding:10px; font-size:0.85rem;" id="name-list">
                </div>
        </div>
    </div>
</div>

<script>
document.getElementById('payroll-form').onsubmit = async (e) => {
    e.preventDefault();
    if(!confirm("명세서 발송을 시작하시겠습니까?")) return;

    const formData = new FormData(e.target);
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('status-panel').style.display = 'block';

    const res = await fetch('/payroll/send', { method: 'POST', body: formData });
    
    const interval = setInterval(async () => {
        const statusRes = await fetch('/payroll/status');
        const data = await statusRes.json();
        
        const percent = Math.round((data.sent_count / data.total_count) * 100);
        document.getElementById('progress-percent').innerText = `${percent}% (${data.sent_count}/${data.total_count})`;
        document.getElementById('name-list').innerHTML = data.sent_names.map(name => `• ${name} 발송완료`).join('<br>');
        
        if(!data.is_running && data.sent_count === data.total_count) {
            clearInterval(interval);
            document.getElementById('status-text').innerText = "✅ 모든 발송이 완료되었습니다.";
            alert("발송 완료!");
        }
    }, 2000);
};
</script>
{% endblock %}
