{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/dropzone.min.css">

<style>
    /* 상단 업로드 섹션 스타일 */
    .upload-section {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border-radius: 15px;
        padding: 25px 30px;
        margin-bottom: 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        border: 1px solid #dee2e6;
    }
    
    /* 토글 아이콘 전환 애니메이션 */
    .toggle-icon { transition: transform 0.3s ease; }
    .toggle-icon.open { transform: rotate(180deg); color: #0d6efd; }

    .dropzone {
        background: white; border: 2px dashed #0d6efd; border-radius: 10px;
        min-height: 150px; display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: background 0.3s ease;
    }
    .dropzone:hover { background: #f1f7ff; }

    /* 8열 정사각 그리드 레이아웃 */
    .custom-gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 15px;
    }

    /* 갤러리 아이템 */
    .gallery-item {
        position: relative; aspect-ratio: 1 / 1; border-radius: 12px;
        overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        background-color: #f1f1f1;
    }

    .gallery-item img {
        width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease;
    }
    .gallery-item:hover img { transform: scale(1.08); }

    /* [수정] 평소엔 투명하다가 호버 시, 혹은 체크되었을 때만 보이는 체크박스 */
    .photo-checkbox {
        position: absolute; top: 12px; left: 12px;
        width: 20px; height: 20px; cursor: pointer; z-index: 10;
        accent-color: #0d6efd; transform: scale(1.2);
        opacity: 0; transition: opacity 0.2s ease-in-out;
    }
    .gallery-item:hover .photo-checkbox,
    .photo-checkbox:checked {
        opacity: 1;
    }

    /* 하단 오버레이 */
    .item-overlay {
        position: absolute; bottom: 0; left: 0; right: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        padding: 20px 10px 10px 10px; display: flex; justify-content: space-between; align-items: center;
        opacity: 0; transition: opacity 0.3s ease; z-index: 2;
    }
    .gallery-item:hover .item-overlay { opacity: 1; }
    .item-title { color: white; font-size: 0.85rem; max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-delete { color: #ff4d4d; background: none; border: none; cursor: pointer; font-size: 1rem; }
    .btn-delete:hover { color: #ff1a1a; }

    /* --- [수정] 슬라이드쇼 모달창 (세련된 프레임 스타일) --- */
    #slideshowModal {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.85); z-index: 9999;
        display: none; justify-content: center; align-items: center;
    }
    
    .slideshow-content-wrapper {
        background: #ffffff; border-radius: 12px;
        border-top: 6px solid #0d6efd; /* 예쁜 상단 테두리 */
        box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        width: 90vw; max-width: 800px;
        display: flex; flex-direction: column; overflow: hidden;
    }

    .slideshow-header {
        padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        background: #f8f9fa; border-bottom: 1px solid #e9ecef;
    }
    
    .slideshow-header h4 { margin: 0; font-size: 1.1rem; color: #333; font-weight: bold; }
    
    .btn-close-slideshow {
        background: none; border: none; color: #888; font-size: 1.5rem; cursor: pointer; transition: color 0.2s;
    }
    .btn-close-slideshow:hover { color: #ff4d4d; }

    .slideshow-body {
        padding: 20px; text-align: center; background: #222; 
        min-height: 450px; display: flex; align-items: center; justify-content: center;
        position: relative;
    }

    /* 슬라이드쇼 애니메이션 효과 (잔상 버그 해결) */
    .slideshow-img {
        max-width: 100%; max-height: 60vh; border-radius: 6px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        transition: opacity 0.4s ease, transform 0.4s ease;
        opacity: 0; /* 기본적으로 투명상태에서 시작 */
        transform: scale(0.95);
    }
    .effect-active { opacity: 1 !important; transform: scale(1) translateX(0) !important; }
    .effect-hide-fade { opacity: 0; }
    .effect-hide-zoom { opacity: 0; transform: scale(0.6); }
    .effect-hide-slide { opacity: 0; transform: translateX(100px); }
</style>

<div class="container-fluid mt-4 px-4">
    
    <div class="upload-section">
        <div class="d-flex justify-content-between align-items-center" id="btnToggleUpload" style="cursor: pointer;">
            <div>
                <h3 class="mb-1"><i class="fas fa-camera-retro text-primary"></i> 개인 미디어 갤러리</h3>
                <p class="text-muted small mb-0">사진을 올리시려면 여기를 클릭하여 창을 펼쳐주세요.</p>
            </div>
            <div>
                <i class="fas fa-chevron-down fa-2x text-muted toggle-icon" id="uploadToggleIcon"></i>
            </div>
        </div>
        
        <div id="uploadContent" style="display: none; margin-top: 25px; border-top: 1px solid #dee2e6; padding-top: 25px;">
            <form action="{{ url_for('gallery.upload') }}" class="dropzone" id="galleryDropzone">
                <div class="dz-message" data-dz-message>
                    <i class="fas fa-cloud-upload-alt fa-3x mb-2 text-primary"></i><br>
                    <span>여기로 사진을 드래그하거나 클릭하여 업로드하세요.</span>
                </div>
            </form>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <button id="btnSelectAll" class="btn btn-sm btn-outline-primary"><i class="fas fa-check-double"></i> 전체 선택</button>
            <button id="btnPlaySlideshow" class="btn btn-sm btn-success ms-2"><i class="fas fa-play"></i> 선택된 사진 슬라이드쇼</button>
        </div>
        <span class="text-muted small">썸네일에 마우스를 올리면 선택 상자가 나타납니다.</span>
    </div>

    {% if files %}
    <div class="custom-gallery-grid">
        {% for file in files %}
        <div class="gallery-item">
            <input type="checkbox" class="photo-checkbox" value="{{ url_for('gallery.serve_file', filename=file.filename) }}" data-title="{{ file.title }}" onclick="event.stopPropagation();">
            
            <a href="{{ url_for('gallery.serve_file', filename=file.filename) }}" 
               class="glightbox w-100 h-100 d-block" 
               data-gallery="saedam_gallery" 
               data-title="{{ file.title }}">
                <img src="{{ url_for('gallery.serve_thumb', filename=file.thumb_name) }}" alt="{{ file.title }}" loading="lazy">
            </a>
            
            <div class="item-overlay">
                <span class="item-title">{{ file.title }}</span>
                <a href="{{ url_for('gallery.delete', id=file.id) }}" 
                   class="btn-delete" 
                   onclick="return confirm('정말 삭제하시겠습니까?')"
                   title="삭제">
                    <i class="fas fa-trash-alt"></i>
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="text-center py-5">
        <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
        <h5 class="text-muted">업로드된 사진이 없습니다.</h5>
    </div>
    {% endif %}
</div>

<div id="slideshowModal">
    <div class="slideshow-content-wrapper">
        <div class="slideshow-header">
            <h4 id="slideshowTitle">슬라이드쇼</h4>
            <button id="btnCloseSlideshow" class="btn-close-slideshow"><i class="fas fa-times"></i></button>
        </div>
        <div class="slideshow-body">
            <img id="slideshowImg" src="" class="slideshow-img">
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/dropzone.min.js"></script>

<script>
    // 1. GLightbox 초기화
    const lightbox = GLightbox({
        selector: '.glightbox',
        touchNavigation: true,
        loop: true,
        width: '90vw'
    });

    // 2. Dropzone.js 설정
    Dropzone.options.galleryDropzone = {
        paramName: "file",
        maxFilesize: 20,
        acceptedFiles: "image/*",
        init: function() {
            this.on("queuecomplete", function(file) {
                setTimeout(() => { window.location.reload(); }, 1000);
            });
        }
    };

    // 3. 업로드 창 접기/펴기 토글 로직
    document.getElementById('btnToggleUpload').addEventListener('click', function() {
        const content = document.getElementById('uploadContent');
        const icon = document.getElementById('uploadToggleIcon');
        
        if(content.style.display === 'none') {
            content.style.display = 'block';
            icon.classList.add('open');
        } else {
            content.style.display = 'none';
            icon.classList.remove('open');
        }
    });

    // 4. 슬라이드쇼 로직 (글리치 현상 완벽 해결)
    let slideInterval;
    let slideImages = [];
    let currentIndex = 0;
    const hideEffects = ['effect-hide-fade', 'effect-hide-zoom', 'effect-hide-slide'];

    document.getElementById('btnSelectAll').addEventListener('click', function() {
        const checkboxes = document.querySelectorAll('.photo-checkbox');
        const allChecked = Array.from(checkboxes).every(cb => cb.checked);
        checkboxes.forEach(cb => cb.checked = !allChecked);
    });

    document.getElementById('btnPlaySlideshow').addEventListener('click', function() {
        const checkedBoxes = document.querySelectorAll('.photo-checkbox:checked');
        if(checkedBoxes.length === 0) {
            alert('슬라이드쇼로 볼 사진을 하나 이상 선택해주세요.');
            return;
        }

        slideImages = Array.from(checkedBoxes).map(cb => ({
            src: cb.value,
            title: cb.getAttribute('data-title')
        }));
        
        currentIndex = 0;
        document.getElementById('slideshowModal').style.display = 'flex';
        
        showSlide(); 
        slideInterval = setInterval(nextSlide, 2500); // 완전한 전환을 위해 2.5초 간격 권장
    });

    document.getElementById('btnCloseSlideshow').addEventListener('click', function() {
        document.getElementById('slideshowModal').style.display = 'none';
        clearInterval(slideInterval);
        const img = document.getElementById('slideshowImg');
        img.className = 'slideshow-img'; // 클래스 초기화
    });

    function nextSlide() {
        currentIndex = (currentIndex + 1) % slideImages.length;
        showSlide();
    }

    function showSlide() {
        const img = document.getElementById('slideshowImg');
        const title = document.getElementById('slideshowTitle');

        // [핵심] 1. 기존 사진을 투명하게 만듦 (퇴장)
        img.className = 'slideshow-img ' + hideEffects[Math.floor(Math.random() * hideEffects.length)];

        // 2. 0.4초(투명해지는 시간) 대기 후, 눈에 보이지 않을 때 사진 소스 교체
        setTimeout(() => {
            img.src = slideImages[currentIndex].src;
            title.innerText = slideImages[currentIndex].title;
            
            // 3. 새 사진이 완전히 로드된 후에 페이드인 (등장)
            img.onload = function() {
                void img.offsetWidth; // DOM 렌더링 강제 업데이트
                img.className = 'slideshow-img effect-active';
            };
        }, 400); 
    }
</script>

{% endblock %}
