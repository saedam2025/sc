{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* 상단 업로드 섹션 스타일 */
    .upload-section {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border-radius: 15px;
        padding: 30px;
        margin-bottom: 40px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        border: 1px solid #dee2e6;
    }
    
    /* 8열 정사각 그리드 레이아웃 */
    .custom-gallery-grid {
        display: grid;
        /* 기본 모바일 3열, 패드 5열, PC 8열 자동 반응형 */
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 15px;
    }

    /* 갤러리 아이템 (정사각형 유지) */
    .gallery-item {
        position: relative;
        aspect-ratio: 1 / 1;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        background-color: #f1f1f1;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .gallery-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* 이미지를 정사각형에 맞게 꽉 채움 (찌그러짐 방지) */
        transition: transform 0.4s ease;
    }

    .gallery-item:hover img {
        transform: scale(1.08);
    }

    /* 비디오 뱃지 */
    .video-icon {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        z-index: 2;
    }

    /* 하단 오버레이 (제목 및 삭제 버튼) */
    .item-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        padding: 20px 10px 10px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 2;
    }

    .gallery-item:hover .item-overlay {
        opacity: 1;
    }

    .item-title {
        color: white;
        font-size: 0.85rem;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 80%;
    }

    .btn-delete {
        color: #ff4d4d;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        transition: color 0.2s;
    }
    .btn-delete:hover {
        color: #ff1a1a;
    }

    /* 파일 업로드 인풋 스타일링 */
    .styled-file-input::-webkit-file-upload-button {
        background: #0d6efd;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.2s;
    }
    .styled-file-input::-webkit-file-upload-button:hover {
        background: #0b5ed7;
    }
</style>

<div class="container-fluid mt-4 px-4">
    
    <div class="upload-section">
        <div class="row align-items-center">
            <div class="col-lg-5 mb-3 mb-lg-0">
                <h3 class="mb-1"><i class="fas fa-camera-retro text-primary"></i> 미디어 갤러리</h3>
                <p class="text-muted small mb-0">사내 전용 암호화 스토리지입니다.</p>
            </div>
            <div class="col-lg-7">
                <form action="{{ url_for('gallery.upload') }}" method="post" enctype="multipart/form-data" class="d-flex flex-wrap gap-2 justify-content-lg-end align-items-center">
                    <input type="text" name="title" class="form-control" placeholder="사진/영상 제목" style="max-width: 200px;" required>
                    <input type="file" name="file" class="form-control styled-file-input" style="max-width: 300px;" accept="image/*,video/*" required>
                    <button type="submit" class="btn btn-primary px-4"><i class="fas fa-cloud-upload-alt"></i> 업로드</button>
                </form>
            </div>
        </div>
    </div>

    {% if files %}
    <div class="custom-gallery-grid">
        {% for file in files %}
        <div class="gallery-item">
            <a href="{{ url_for('gallery.serve_file', filename=file.filename) }}" 
               class="glightbox w-100 h-100 d-block" 
               data-gallery="saedam_gallery" 
               data-title="{{ file.title }}"
               data-description="업로드일: {{ file.created_at }}">
                
                <img src="{{ url_for('gallery.serve_thumb', filename=file.thumb_name) }}" alt="{{ file.title }}" loading="lazy">
                
                {% if file.file_type == 'video' %}
                <div class="video-icon"><i class="fas fa-play"></i></div>
                {% endif %}
            </a>
            
            <div class="item-overlay">
                <span class="item-title">{{ file.title }}</span>
                <a href="{{ url_for('gallery.delete', id=file.id) }}" 
                   class="btn-delete" 
                   onclick="return confirm('정말 삭제하시겠습니까?')"
                   title="삭제">
                    <i class="fas fa-trash-alt"></i>
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="text-center py-5">
        <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
        <h5 class="text-muted">업로드된 미디어가 없습니다.</h5>
    </div>
    {% endif %}

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>
<script>
    const lightbox = GLightbox({
        selector: '.glightbox',
        touchNavigation: true,
        loop: true,
        autoplayVideos: true,
        width: '90vw'
    });
</script>

{% endblock %}
