<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 새담청소년교육문화원 인트라넷</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        /* === 다이나믹 테마 변수 === */
        :root {
            --body-bg: #f8fafc;
            --primary-color: #4a90e2;
            --primary-dark: #357abd;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            
            /* 카드 및 위젯 재질 */
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(255, 255, 255, 0.9);
            --card-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            --card-backdrop: blur(24px);
            
            --input-bg: rgba(255, 255, 255, 0.8);
            --input-text: #1e293b;
            --widget-bg: rgba(255, 255, 255, 0.7);
            --widget-hover: rgba(255, 255, 255, 1);
            --widget-border: rgba(255, 255, 255, 1);
            --tooltip-bg: rgba(15, 23, 42, 0.95);
            --tooltip-text: #ffffff;
            
            /* 배경 효과 색상 */
            --effect-color1: transparent;
            --effect-color2: transparent;
            --effect-color3: transparent;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }

        body {
            display: flex; flex-direction: column; gap: 20px; 
            align-items: center; justify-content: center; min-height: 100vh;
            position: relative; overflow: hidden; padding: 20px 20px 15vh 20px; 
            background: var(--body-bg); background-size: 400% 400%;
            animation: gradientBG 20s ease infinite; transition: background 1.5s ease;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* ====================================================
           ✨ 배경 애니메이션 효과 (별, 물방울, 블롭 등)
           ==================================================== */
        .stars-small { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(1px 1px at 10% 20%, #fff, transparent), radial-gradient(1px 1px at 30% 60%, #fff, transparent), radial-gradient(1.5px 1.5px at 50% 10%, #fff, transparent), radial-gradient(1px 1px at 70% 80%, #fff, transparent), radial-gradient(2px 2px at 90% 30%, #fff, transparent); background-size: 150px 150px; animation: twinkle 4s infinite alternate; }
        .stars-medium { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(2px 2px at 20% 80%, rgba(255,255,255,0.8), transparent), radial-gradient(2.5px 2.5px at 40% 30%, rgba(255,255,255,0.9), transparent), radial-gradient(2px 2px at 60% 70%, rgba(255,255,255,0.7), transparent), radial-gradient(3px 3px at 80% 20%, #fff, transparent); background-size: 250px 250px; animation: twinkle 3s infinite alternate -1.5s; }
        .stars-large { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(3px 3px at 15% 40%, #fff, transparent), radial-gradient(4px 4px at 55% 55%, #fff, transparent), radial-gradient(3.5px 3.5px at 85% 85%, #fff, transparent); background-size: 400px 400px; animation: twinkle 5s infinite alternate -3s; }
        .shooting-star { position: absolute; width: 100px; height: 2px; background: linear-gradient(90deg, rgba(255,255,255,1), transparent); border-radius: 50%; transform: rotate(-45deg); animation: shooting 8s infinite linear; opacity: 0; }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 10px rgba(255,255,255,0.5); } }
        @keyframes shooting { 0% { transform: rotate(-45deg) translateX(0); opacity: 1; } 10% { transform: rotate(-45deg) translateX(-100vw); opacity: 0; } 100% { transform: rotate(-45deg) translateX(-100vw); opacity: 0; } }

        .bubble { position: absolute; bottom: -50px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.2); animation: rise infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0) scale(1) translateX(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-120vh) scale(1.5) translateX(20px); opacity: 0; } }

        .blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.7; animation: morph 15s ease-in-out infinite, spin 25s linear infinite; }
        .blob-1 { width: 65vw; height: 65vw; top: -10%; left: -10%; animation-duration: 18s, 30s; }
        .blob-2 { width: 55vw; height: 55vw; bottom: -20%; right: -10%; animation-direction: reverse; animation-duration: 22s, 35s; }
        .blob-3 { width: 60vw; height: 60vw; top: 20%; left: 30%; animation-duration: 20s, 28s; }
        @keyframes morph { 0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; } 34% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; } 67% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .glow-orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.5; animation: orbOrbit 20s infinite alternate ease-in-out; }
        .orb-1 { width: 45vw; height: 45vw; top: -10%; left: -10%; animation-duration: 25s; }
        .orb-2 { width: 40vw; height: 40vw; bottom: -10%; right: -5%; animation-duration: 22s; animation-direction: alternate-reverse; }
        .orb-3 { width: 55vw; height: 55vw; top: 30%; left: 30%; animation-duration: 28s; }
        .cyber-grid { position: absolute; top:0; left:0; width:100%; height:100%; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 50px 50px; mask-image: radial-gradient(circle at center, black 40%, transparent 100%); -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%); }
        @keyframes orbOrbit { 0% { transform: translate(0, 0) scale(1); } 33% { transform: translate(10vw, 15vh) scale(1.1); } 66% { transform: translate(-10vw, -10vh) scale(0.9); } 100% { transform: translate(15vw, -5vh) scale(1.2); } }

        .wave { position: absolute; width: 300vw; height: 300vw; left: -100vw; top: 55vh; border-radius: 43%; animation: wave-spin 12s infinite linear; }
        .wave-2 { top: 58vh; animation-duration: 18s; border-radius: 40%; }
        .wave-3 { top: 61vh; animation-duration: 25s; border-radius: 45%; }
        @keyframes wave-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .shape-box { position: absolute; bottom: -150px; background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.3); animation: floatShape linear infinite; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        @keyframes floatShape { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-120vh) rotate(720deg); opacity: 0; } }

        .glass-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 0 30px rgba(255,255,255,0.1), inset 0 0 20px rgba(255,255,255,0.05); animation: ringPulse infinite ease-in-out alternate; }
        @keyframes ringPulse { 0% { transform: scale(0.8) rotate(0deg); opacity: 0.2; } 100% { transform: scale(1.1) rotate(15deg); opacity: 0.7; } }

        .polygon { position: absolute; bottom: -150px; opacity: 0.4; animation: floatShape linear infinite; }
        .poly-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .poly-hexagon { clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }

        .glowing-line { position: absolute; height: 2px; width: 200vw; left: -50vw; opacity: 0; }
        .line-pos { animation: slideLinePos infinite linear; }
        .line-neg { animation: slideLineNeg infinite linear; }
        @keyframes slideLinePos { 0% { transform: translateY(-100vh) rotate(30deg); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(100vh) rotate(30deg); opacity: 0; } }
        @keyframes slideLineNeg { 0% { transform: translateY(100vh) rotate(-30deg); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-100vh) rotate(-30deg); opacity: 0; } }


        /* ====================================================
           ✨ 선명한 반짝임 배경 액션 5종
           starPop / starSprinkle / glitterField / cometTwinkle / neonGeometryFlow
           ==================================================== */

        /* 1) 군데군데 별이 나타났다 사라지는 효과 */
        .spark-pop-star {
            position: absolute;
            color: var(--primary-color);
            font-weight: 900;
            line-height: 1;
            opacity: 0;
            pointer-events: none;
            transform-origin: center;
            text-shadow:
                0 0 1px rgba(255, 255, 255, 1),
                0 0 6px rgba(255, 255, 255, 0.9),
                0 0 14px var(--effect-color1),
                0 0 26px var(--primary-color);
            animation: sparkPopStar ease-in-out infinite;
        }

        @keyframes sparkPopStar {
            0%, 100% {
                opacity: 0;
                transform: scale(0.25) rotate(0deg);
                filter: brightness(1) blur(0.5px);
            }
            12% {
                opacity: 0.95;
                transform: scale(1.05) rotate(12deg);
                filter: brightness(1.25) blur(0);
            }
            24% {
                opacity: 0.35;
                transform: scale(0.72) rotate(-8deg);
            }
            42% {
                opacity: 1;
                transform: scale(1.25) rotate(18deg);
                filter: brightness(1.45);
            }
            68% {
                opacity: 0.18;
                transform: scale(0.55) rotate(-12deg);
            }
        }

        /* 2) 작은 별들이 흩뿌려지듯 깜빡이는 효과 */
        .sprinkle-star {
            position: absolute;
            width: 7px;
            height: 7px;
            opacity: 0;
            pointer-events: none;
            transform-origin: center;
            animation: sprinkleStarBlink ease-in-out infinite;
        }

        .sprinkle-star::before,
        .sprinkle-star::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            background: var(--primary-color);
            border-radius: 999px;
            transform: translate(-50%, -50%);
            box-shadow:
                0 0 4px rgba(255, 255, 255, 0.95),
                0 0 10px var(--effect-color1),
                0 0 18px var(--primary-color);
        }

        .sprinkle-star::before {
            width: 100%;
            height: 2px;
        }

        .sprinkle-star::after {
            width: 2px;
            height: 100%;
        }

        @keyframes sprinkleStarBlink {
            0%, 100% {
                opacity: 0;
                transform: scale(0.35) rotate(0deg);
            }
            18% {
                opacity: 0.9;
                transform: scale(1) rotate(45deg);
            }
            45% {
                opacity: 0.3;
                transform: scale(0.65) rotate(80deg);
            }
            70% {
                opacity: 1;
                transform: scale(1.2) rotate(135deg);
            }
        }

        /* 3) 고급스러운 반짝 먼지 입자 */
        .glitter-field-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary-color);
            opacity: 0;
            pointer-events: none;
            box-shadow:
                0 0 4px rgba(255, 255, 255, 0.95),
                0 0 9px var(--effect-color1),
                0 0 18px var(--primary-color);
            animation: glitterFieldFloat linear infinite;
        }

        @keyframes glitterFieldFloat {
            0% {
                opacity: 0;
                transform: translate3d(0, 0, 0) scale(0.45);
            }
            14% {
                opacity: 0.9;
            }
            48% {
                opacity: 0.42;
                transform: translate3d(16px, -28vh, 0) scale(1.05);
            }
            76% {
                opacity: 0.95;
            }
            100% {
                opacity: 0;
                transform: translate3d(-10px, -62vh, 0) scale(0.45);
            }
        }

        /* 4) 짧고 선명한 꼬리별 + 주변 반짝임 */
        .clean-comet {
            position: absolute;
            width: 150px;
            height: 3px;
            border-radius: 999px;
            opacity: 0;
            pointer-events: none;
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 1),
                var(--primary-color),
                var(--effect-color1),
                transparent
            );
            box-shadow:
                0 0 8px rgba(255, 255, 255, 0.9),
                0 0 18px var(--primary-color);
            transform: rotate(-26deg);
            animation: cleanCometMove linear infinite;
        }

        .clean-comet::before {
            content: '';
            position: absolute;
            left: -5px;
            top: -5px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow:
                0 0 8px rgba(255, 255, 255, 1),
                0 0 20px var(--primary-color),
                0 0 32px var(--effect-color1);
        }

        @keyframes cleanCometMove {
            0% {
                opacity: 0;
                transform: translate3d(0, 0, 0) rotate(-26deg);
            }
            7% {
                opacity: 1;
            }
            23% {
                opacity: 0;
                transform: translate3d(-42vw, 24vh, 0) rotate(-26deg);
            }
            100% {
                opacity: 0;
                transform: translate3d(-42vw, 24vh, 0) rotate(-26deg);
            }
        }

/* 5) 선형/도형 효과: 네온 지오메트리 플로우 */
        .neon-flow-line {
            position: absolute;
            height: 2px;
            width: 34vw;
            min-width: 260px;
            opacity: 0;
            pointer-events: none;
            border-radius: 999px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.95),
                var(--effect-color1),
                transparent
            );
            box-shadow:
                0 0 10px rgba(255, 255, 255, 0.75),
                0 0 22px var(--effect-color1);
            animation: neonFlowLineMove linear infinite;
        }

        .neon-flow-line.reverse {
            animation-name: neonFlowLineMoveReverse;
        }

        @keyframes neonFlowLineMove {
            0% {
                opacity: 0;
                transform: translate3d(30vw, -10vh, 0) rotate(-18deg) scaleX(0.45);
            }
            12% {
                opacity: 0.8;
            }
            45% {
                opacity: 0.55;
                transform: translate3d(-18vw, 18vh, 0) rotate(-18deg) scaleX(1);
            }
            72% {
                opacity: 0.15;
            }
            100% {
                opacity: 0;
                transform: translate3d(-55vw, 35vh, 0) rotate(-18deg) scaleX(0.55);
            }
        }

        @keyframes neonFlowLineMoveReverse {
            0% {
                opacity: 0;
                transform: translate3d(-30vw, -8vh, 0) rotate(18deg) scaleX(0.45);
            }
            12% {
                opacity: 0.75;
            }
            45% {
                opacity: 0.5;
                transform: translate3d(18vw, 18vh, 0) rotate(18deg) scaleX(1);
            }
            72% {
                opacity: 0.15;
            }
            100% {
                opacity: 0;
                transform: translate3d(55vw, 35vh, 0) rotate(18deg) scaleX(0.55);
            }
        }

        .geo-flow-shape {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.82),
                var(--effect-color1),
                rgba(255,255,255,0.28)
            );
            border: 1px solid rgba(255,255,255,0.65);
            box-shadow:
                0 0 10px rgba(255,255,255,0.45),
                0 0 24px var(--effect-color1);
            animation: geoFlowShapeFloat ease-in-out infinite;
        }

        .geo-flow-shape.diamond {
            transform: rotate(45deg);
        }

        .geo-flow-shape.triangle {
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        .geo-flow-shape.slash {
            height: 8px !important;
            border-radius: 999px;
            transform: rotate(-28deg);
        }

        @keyframes geoFlowShapeFloat {
            0%, 100% {
                opacity: 0;
                filter: blur(1px);
            }
            18% {
                opacity: 0.75;
                filter: blur(0);
            }
            48% {
                opacity: 0.42;
                transform: translate3d(18px, -18px, 0) rotate(18deg);
            }
            70% {
                opacity: 0.85;
            }
        }

        .snow-flake { position: absolute; border-radius: 50%; background: #fff; opacity: 0.8; box-shadow: 0 0 8px #fff; animation: snowFall linear infinite; }
        @keyframes snowFall { 0% { transform: translateY(-10vh) translateX(0); } 100% { transform: translateY(110vh) translateX(30px); } }
        .firefly { position: absolute; border-radius: 50%; box-shadow: 0 0 10px currentColor, 0 0 20px currentColor; animation: fireflyMove ease-in-out infinite alternate; }
        @keyframes fireflyMove { 0% { transform: translate(0, 0) scale(0.8); opacity: 0.3; } 100% { transform: translate(40px, -60px) scale(1.5); opacity: 1; } }
        .aurora-band { position: absolute; width: 150vw; height: 50vh; filter: blur(80px); opacity: 0.5; border-radius: 50%; animation: auroraSway 15s infinite alternate ease-in-out; }
        @keyframes auroraSway { 0% { transform: translateX(-20vw) translateY(-10vh) rotate(-5deg); } 100% { transform: translateX(10vw) translateY(20vh) rotate(5deg); } }
        .confetti-piece { position: absolute; animation: spinFall linear infinite; }
        @keyframes spinFall { 0% { transform: translateY(-10vh) rotate(0deg) rotateX(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg) rotateX(360deg); opacity: 0; } }
        .lantern { position: absolute; border-radius: 10px 10px 5px 5px; box-shadow: 0 0 20px currentColor; animation: lanternFloatUp linear infinite; }
        @keyframes lanternFloatUp { 0% { transform: translateY(110vh) translateX(0) scale(1); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(-10vh) translateX(50px) scale(0.8); opacity: 0; } }
        .ripple-ring { position: absolute; border-radius: 50%; border: 2px solid; animation: rippleExpand linear infinite; }
        @keyframes rippleExpand { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
        .meteor { position: absolute; width: 2px; height: 60px; background: linear-gradient(to bottom, transparent, #fff); animation: meteorDrop linear infinite; }
        @keyframes meteorDrop { 0% { transform: translateY(-20vh) translateX(20vw) rotate(45deg); opacity: 1; } 100% { transform: translateY(120vh) translateX(-40vw) rotate(45deg); opacity: 0; } }
        .crystal-prism { position: absolute; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); opacity: 0.5; filter: drop-shadow(0 0 10px currentColor); animation: crystalSpin linear infinite; }
        @keyframes crystalSpin { 0% { transform: translateY(110vh) rotateY(0deg) rotateZ(0deg); } 100% { transform: translateY(-20vh) rotateY(360deg) rotateZ(180deg); } }
        .cosmic-dust { position: absolute; border-radius: 50%; filter: blur(4px); animation: pulseDust ease-in-out infinite alternate; }
        @keyframes pulseDust { 0% { transform: scale(0.5); opacity: 0.1; } 100% { transform: scale(2); opacity: 0.7; } }
        .floating-heart { position: absolute; font-size: 24px; animation: heartFloat ease-in infinite; }
        @keyframes heartFloat { 0% { transform: translateY(100vh) scale(0.5); opacity: 0; } 20% { opacity: 0.9; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        .cyber-line { position: absolute; height: 1px; width: 100vw; left: 0; box-shadow: 0 0 10px currentColor; animation: gridMove linear infinite; }
        @keyframes gridMove { 0% { transform: translateY(0vh) scaleY(1); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(100vh) scaleY(2); opacity: 0; } }
        .matrix-drop { position: absolute; width: 2px; height: 80px; background: linear-gradient(to bottom, transparent, currentColor, #fff); animation: matrixFall linear infinite; }
        @keyframes matrixFall { 0% { transform: translateY(-100px); opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }
        .autumn-leaf { position: absolute; border-radius: 0 50% 0 50%; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); animation: leafFall linear infinite; }
        @keyframes leafFall { 0% { transform: translateY(-10vh) translateX(0) rotate(0deg) rotateX(0deg); } 100% { transform: translateY(110vh) translateX(100px) rotate(360deg) rotateX(360deg); } }
        .circuit-path { position: absolute; border: 2px solid transparent; border-top-color: currentColor; border-right-color: currentColor; animation: drawCircuit linear infinite; }
        @keyframes drawCircuit { 0% { width: 0; height: 0; opacity: 1; } 50% { width: 80px; height: 0; opacity: 1;} 100% { width: 80px; height: 80px; opacity: 0; } }
        .electric-spark { position: absolute; background: #fff; box-shadow: 0 0 15px currentColor, 0 0 30px #fff; animation: sparkFlash 0.5s infinite steps(2); }
        @keyframes sparkFlash { 0% { opacity: 0; transform: scale(1) rotate(0deg); } 50% { opacity: 1; transform: scale(2) rotate(25deg); } 100% { opacity: 0; transform: scale(1) rotate(-25deg); } }
        .diamond-pulse { position: absolute; transform: rotate(45deg); border: 2px solid currentColor; animation: diamondBeat ease-in-out infinite alternate; }
        @keyframes diamondBeat { 0% { transform: rotate(45deg) scale(0.5); opacity: 0.1; } 100% { transform: rotate(45deg) scale(1.5); opacity: 0.8; box-shadow: inset 0 0 15px currentColor; } }
        .light-pillar { position: absolute; height: 100vh; top: 0; background: linear-gradient(to left, transparent, currentColor, transparent); animation: pillarFade linear infinite; }
        @keyframes pillarFade { 0% { opacity: 0; transform: translateX(-5vw); } 50% { opacity: 0.2; } 100% { opacity: 0; transform: translateX(5vw); } }
        .magic-rune { position: absolute; font-family: monospace; font-size: 30px; font-weight: bold; animation: runeGlow linear infinite; }
        @keyframes runeGlow { 0% { opacity: 0; transform: translateY(0) scale(0.8); } 50% { opacity: 0.8; text-shadow: 0 0 15px currentColor; transform: translateY(-30px) scale(1.2); } 100% { opacity: 0; transform: translateY(-60px) scale(0.8); } }
        .plasma-orb { position: absolute; border-radius: 50%; filter: blur(8px); animation: plasmaBounce ease-in-out infinite alternate; }
        @keyframes plasmaBounce { 0% { transform: translateY(0) scale(0.8); opacity: 0.4; } 100% { transform: translateY(-80px) scale(1.3); opacity: 0.9; } }
        .stardust-trail { position: absolute; border-radius: 50%; box-shadow: 0 0 12px currentColor; animation: trailWander linear infinite; }
        @keyframes trailWander { 0% { transform: translate(0, 0); opacity: 1; } 100% { transform: translate(120px, 120px); opacity: 0; } }

        .seasonal-petal, .festival-ribbon, .pepero-stick, .christmas-snowflake, .christmas-ornament, .summer-sparkle, .harvest-moon { position: absolute; pointer-events: none; }
        .seasonal-petal { top: -12vh; border-radius: 72% 28% 68% 32%; background: var(--effect-color1); box-shadow: 0 0 10px rgba(255,255,255,0.55), 0 0 18px currentColor; animation: seasonalDrift linear infinite; }

        @media (max-width: 600px) {

        }
    </style>
</head>

    <script src="{{ url_for('static', filename='js/saedam_theme_catalog.js') }}?v=20260713-3009" onerror="console.warn('테마 카탈로그를 불러오지 못해 내장 테마를 사용합니다.');"></script>
    <script>
        // === 다이나믹 테마 생성 엔진 ===
        const uiStyles = ['glass', 'solid', 'glow', 'neumorphism', 'clay'];
        const paletteNames = ["파스텔", "비비드", "뮤트", "하이콘트라스트", "딥틴트"];
        const effectsList = [
            'stars', 'bubbles', 'blobs', 'orbs', 'waves', 'geometry', 'rings', 'polygons', 'lines', 'starPop', 'starSprinkle', 'glitterField', 'cometTwinkle', 'neonGeometryFlow',
            'snowfall', 'fireflies', 'aurora', 'confetti', 'lanterns', 'rippleWaves', 'meteorShower', 'crystalPrisms', 'cosmicDust', 'floatingHearts', 'cyberLines', 'matrixDrops', 'autumnLeaves', 'circuitPaths', 'electricSparks', 'diamondPulse', 'lightPillars', 'magicRunes', 'plasmaOrbs', 'stardustTrails'
        ]; 
        
        const adjectives = ["미스틱", "네온", "사이버", "오가닉", "코스믹", "딥", "퓨어", "루미너스", "크리스탈", "벨벳", "아스트랄", "스파클링", "글로우", "매직", "아우라", "일루전", "드림", "일렉트릭", "팬텀", "인피니티", "루나", "솔라", "시크릿", "로얄", "엔젤릭", "루비", "사파이어", "에메랄드", "스텔라", "다이내믹", "프리즘", "에테르", "소닉", "루시드", "비비드", "폴리곤", "매트릭스", "헥사곤", "지오메트릭", "라인"];
        const nouns = ["오션", "블랙홀", "네뷸라", "선셋", "웨이브", "포레스트", "플레어", "갤럭시", "마블", "실버", "골드", "스톰", "이클립스", "클라우드", "라군", "펄", "스타더스트", "메트릭스", "퀘이사", "스페이스", "드롭", "플로우", "오로라", "블리즈", "스카이", "크리스탈", "오아시스", "유니버스", "홀로그램", "미라지", "오디세이", "스펙트럼", "호라이즌", "에코", "포털"];

        const generatedThemes = [];
        const hiddenThemeKeys = new Set({{ hidden_theme_keys|default([], true)|tojson }});

        for (let i = 0; i < 2000; i++) {
            const hue = Math.floor((i * 137.5) % 360);
            const paletteStyle = i % 5;
            const useComplementary = (i % 7 === 0);
            const pointHue = useComplementary ? (hue + 180) % 360 : hue;
            const effectType = effectsList[i % effectsList.length];
            const uiStyle = uiStyles[i % uiStyles.length]; 
            
            let styleNameKOR = "유리";
            if (uiStyle === 'solid') styleNameKOR = "솔리드";
            else if (uiStyle === 'glow') styleNameKOR = "네온";
            else if (uiStyle === 'neumorphism') styleNameKOR = "뉴모피즘";
            else if (uiStyle === 'clay') styleNameKOR = "클레이";

            let bgS, bgL, priS, priL, effS, effL;
            switch (paletteStyle) {
                case 0: bgS = 40; bgL = 95; priS = 70; priL = 50; effS = 70; effL = 75; break;
                case 1: bgS = 70; bgL = 90; priS = 90; priL = 45; effS = 90; effL = 65; break;
                case 2: bgS = 20; bgL = 92; priS = 40; priL = 45; effS = 40; effL = 70; break;
                case 3: bgS = 10; bgL = 98; priS = 85; priL = 30; effS = 85; effL = 60; break;
                case 4: bgS = 50; bgL = 85; priS = 65; priL = 40; effS = 65; effL = 65; break;
            }

            const pName = paletteNames[paletteStyle];
            const name = `[${styleNameKOR}/${pName}] ${adjectives[Math.floor(Math.random() * adjectives.length)]} ${nouns[Math.floor(Math.random() * nouns.length)]}`;
            const primary = `hsl(${pointHue}, ${priS}%, ${priL}%)`;
            const primaryDark = `hsl(${pointHue}, ${priS}%, ${Math.max(20, priL - 10)}%)`;
            const bg = `linear-gradient(-45deg, hsl(${hue}, ${bgS}%, ${bgL}%), hsl(${(hue + 30) % 360}, ${bgS + 10}%, ${bgL - 5}%), hsl(${(hue - 30 + 360) % 360}, ${bgS}%, ${bgL}%))`;
            
            let vars = {
                "--body-bg": bg, "--primary-color": primary, "--primary-dark": primaryDark,
                "--text-dark": "#0f172a", "--text-gray": "#64748b",
                "--input-text": "#1e293b", "--tooltip-bg": "rgba(15, 23, 42, 0.95)", "--tooltip-text": "#ffffff",
                "--effect-color1": `hsl(${hue}, ${effS}%, ${effL}%)`, 
                "--effect-color2": `hsl(${(hue + 40) % 360}, ${effS}%, ${effL}%)`, 
                "--effect-color3": `hsl(${(hue - 40 + 360) % 360}, ${effS}%, ${effL}%)`
            };

            if (uiStyle === 'glass') {
                vars["--card-bg"] = "rgba(255, 255, 255, 0.6)"; vars["--card-border"] = "rgba(255, 255, 255, 0.9)";
                vars["--card-backdrop"] = "blur(24px)"; vars["--card-shadow"] = "0 15px 40px rgba(0, 0, 0, 0.1)";
                vars["--input-bg"] = "rgba(255, 255, 255, 0.8)"; vars["--widget-bg"] = "rgba(255, 255, 255, 0.7)"; 
                vars["--widget-hover"] = "rgba(255, 255, 255, 1)"; vars["--widget-border"] = "rgba(255, 255, 255, 1)";
            } else if (uiStyle === 'solid') {
                vars["--card-bg"] = "#ffffff"; vars["--card-border"] = "transparent";
                vars["--card-backdrop"] = "none"; vars["--card-shadow"] = "0 20px 40px rgba(0, 0, 0, 0.1)";
                vars["--input-bg"] = "#f1f5f9"; vars["--widget-bg"] = "#f1f5f9"; 
                vars["--widget-hover"] = "#e2e8f0"; vars["--widget-border"] = "transparent";
            } else if (uiStyle === 'glow') {
                vars["--card-bg"] = "rgba(255, 255, 255, 0.8)"; vars["--card-border"] = primary;
                vars["--card-backdrop"] = "blur(10px)"; vars["--card-shadow"] = `0 0 25px ${primary}`;
                vars["--input-bg"] = "rgba(255,255,255,0.5)"; vars["--widget-bg"] = "rgba(255,255,255,0.5)"; 
                vars["--widget-hover"] = "rgba(255,255,255,0.9)"; vars["--widget-border"] = primary;
            } else if (uiStyle === 'neumorphism') {
                const neuBg = `hsl(${hue}, ${Math.max(0, bgS - 20)}%, 90%)`;

                vars["--widget-hover"] = neuBg; vars["--widget-border"] = "transparent";

        function configureSeasonalFall(el, options = {}) {
            const size = Math.random() * (options.sizeRange || 14) + (options.sizeMin || 10);
            el.style.left = Math.random() * 100 + '%';
            el.style.width = (options.width ? options.width(size) : size) + 'px';
            el.style.height = (options.height ? options.height(size) : size) + 'px';
            el.style.animationDuration = (Math.random() * (options.durationRange || 5) + (options.durationMin || 5)) + 's';

            if (options.opacity) el.style.setProperty('--season-opacity', options.opacity);
        }

            if (effectType === 'springBreeze') {

                return true;
            } else if (effectType === 'cherryBlossoms') {
                buildFn(container, 'seasonal-petal cherry-petal', 52, (el) => configureSeasonalFall(el, { sizeMin: 9, sizeRange: 17, durationMin: 8, durationRange: 7, opacity: 0.92 }));
                return true;

                container.innerHTML = '<div class="wave" style="background: var(--effect-color1); opacity:0.2"></div><div class="wave wave-2" style="background: var(--effect-color3); opacity:0.16"></div>';
                buildFn(container, 'summer-sparkle', 32, configureSummerSparkle);

                buildFn(container, 'harvest-moon', 1, () => {});

                return true;

        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            
            document.getElementById('liveTime').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('liveDate').textContent = now.toLocaleDateString('ko-KR', dateOptions);
        }

        function initWidgets() {
            const lunches = [
                "🔥 매콤달콤 제육볶음", "🍲 얼큰한 김치찌개", "🍱 바삭바삭 돈까스", "🍜 호로록 짜장면", "🍣 깔끔한 초밥 세트",
                "🥗 가벼운 샐러드", "🍔 든든한 수제버거", "🥘 뜨끈한 국밥 한그릇", "🍕 피자 한 조각", "🍝 고소한 파스타"
            ];
            const randomLunch = lunches[Math.floor(Math.random() * lunches.length)];
            document.getElementById('widget-lunch').textContent = randomLunch;
            document.getElementById('lunch-wrapper').setAttribute('data-tooltip', randomLunch);

            try {
                let currentCount = localStorage.getItem('today_login_count') || 125;
                document.getElementById('widget-users').innerHTML = `${currentCount} 명 <span style="font-size:11px; color:var(--success-color);">●</span>`;
            } catch(e) {
                document.getElementById('widget-users').innerHTML = `125 명 <span style="font-size:11px; color:var(--success-color);">●</span>`;
            }

            const quotes = [
                "성공은 매일 반복한 작은 노력들의 합이다.", "미래는 현재 우리가 무엇을 하는가에 달려 있다.",
                "시작하는 방법은 그만 말하고 이제 행동하는 것이다.", "멈추지 않는 이상, 얼마나 천천히 가는지는 중요하지 않다."
            ];
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('widget-quote').textContent = randomQuote;
            document.getElementById('quote-wrapper').setAttribute('data-tooltip', randomQuote);

            const dustElement = document.getElementById('widget-dust');
            dustElement.textContent = '확인 중...';
            let dustFinished = false;
            const dustTimeout = setTimeout(function () {
                if (!dustFinished) {
                    dustFinished = true;
                    dustElement.innerHTML = '<span style="color:#64748b; font-size:12px;">정보 확인 지연</span>';
                }
            }, 7000);

            if (typeof fetch !== 'function') {
                clearTimeout(dustTimeout);
                dustFinished = true;
                dustElement.innerHTML = '<span style="color:#64748b; font-size:12px;">정보 확인 불가</span>';
                return;
            }

            fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=37.2636&longitude=127.0286&current=pm10')
                .then(function (res) {
                    if (!res.ok) throw new Error('미세먼지 API 응답 오류');
                    return res.json();
                })
                .then(function (data) {
                    if (dustFinished) return;
                    const pm10 = data && data.current ? Number(data.current.pm10) : NaN;
                    if (!Number.isFinite(pm10)) throw new Error('미세먼지 데이터 없음');
                    let status = '좋음', color = 'var(--success-color)';
                    if (pm10 > 30) { status = '보통'; color = '#f59e0b'; }
                    if (pm10 > 80) { status = '나쁨'; color = '#ef4444'; }
                    dustFinished = true;
                    clearTimeout(dustTimeout);
                    dustElement.innerHTML = `<span style="color:${color}; font-weight:800;">${status} <span style="font-size:12px; color:var(--text-gray); font-weight:400;">(${pm10})</span></span>`;
                })
                .catch(function () {
                    if (dustFinished) return;
                    dustFinished = true;
                    clearTimeout(dustTimeout);
                    dustElement.innerHTML = '<span style="color:#ef4444; font-size:12px;">정보 불러오기 실패</span>';
                });
        }

        function handleEnter(e) { if (e.key === 'Enter') doLogin(); }

        async function doLogin() {
            const emp_no = document.getElementById('emp_no').value;
            const password = document.getElementById('password').value;
            if(!emp_no || !password) { alert('사번과 비밀번호를 모두 입력해주세요.'); return; }

            try {
                let currentCount = parseInt(localStorage.getItem('today_login_count') || "125") + 1;
                localStorage.setItem('today_login_count', currentCount);
                document.getElementById('widget-users').innerHTML = `${currentCount} 명 <span style="font-size:11px; color:var(--success-color);">●</span>`;
            } catch (e) {}

            try {
                const res = await fetch('/login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ emp_no, password })
                });
                if(res.ok) {
                    try {
                        document.getElementById('remember_me').checked ? localStorage.setItem('saved_sd_emp', emp_no) : localStorage.removeItem('saved_sd_emp');
                    } catch (e) {}
                    setTimeout(() => location.href = '/', 500); 
                } else {
                    const err = await res.json(); alert(err.message || '로그인에 실패했습니다.');
                }
            } catch (error) {
                alert('서버와 통신하는 중 오류가 발생했습니다. (임시 접속 카운트 완료)');
            }
        }
