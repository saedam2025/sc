<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 새담 인트라넷</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 13px; color: #adb5bd; }
        .input-group input { width: 100%; padding: 12px 12px 12px 45px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; }
        .btn-login { width: 100%; padding: 14px; background: #4a90e2; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="text-align:center; color:#4a90e2;">로그인</h2>
        <div class="input-group">
            <i class="fa-solid fa-id-card"></i>
            <input type="text" id="emp_no" placeholder="사번 입력">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="비밀번호">
        </div>
        <div style="margin-bottom:20px; font-size:14px; color:#666;">
            <label style="cursor:pointer;"><input type="checkbox" id="remember_me"> 사번 저장</label>
        </div>
        <button class="btn-login" onclick="doLogin()">접속하기</button>
    </div>

    <script>
        window.onload = () => {
            const saved = localStorage.getItem('saved_sd_emp');
            if(saved) { document.getElementById('emp_no').value = saved; document.getElementById('remember_me').checked = true; }
        };

        async function doLogin() {
            const emp_no = document.getElementById('emp_no').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ emp_no, password })
            });
            if(res.ok) {
                if(document.getElementById('remember_me').checked) localStorage.setItem('saved_sd_emp', emp_no);
                else localStorage.removeItem('saved_sd_emp');
                location.href = '/';
            } else {
                const err = await res.json();
                alert(err.message);
            }
        }
    </script>
</body>
</html>
