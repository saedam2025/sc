<style>
    /* =========================================================
       새로운 [나의 업무 알림] 그린톤 카드형 위젯 전용 스타일
       ========================================================= */
    .noti-widget-wrapper {
        background: rgba(220, 252, 231, 0.4); /* 연한 녹색/민트빛 컨테이너 배경 */
        border-radius: 15px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 100%;
        box-sizing: border-box;
    }
    
    .noti-card-item {
        background: #ffffff;
        border: 1px solid #10b981; /* 쨍하고 얇은 녹색 테두리 */
        border-radius: 12px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        text-decoration: none;
        color: #1e293b;
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .noti-card-item:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 15px rgba(16, 185, 129, 0.15);
    }
    
    .noti-card-long {
        flex-direction: row;
        justify-content: space-between;
        padding: 15px 25px;
    }
    
    .noti-card-title {
        font-size: 0.85rem;
        color: #64748b;
        font-weight: 700;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    
    .noti-card-long .noti-card-title {
        margin-bottom: 0;
    }
    
    .noti-card-value {
        font-size: 1.1rem;
        font-weight: 800;
        color: #1e293b;
    }
    
    .noti-count-red { color: #ef4444; } /* 빨간색 강조 (결재, 대기 등) */
    .noti-count-blue { color: #3b82f6; } /* 파란색 강조 (단순 알림) */

    .noti-grid-container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        flex: 1;
    }
    
    @media (max-width: 1300px) {
        .noti-grid-container { grid-template-columns: repeat(2, 1fr); }
    }
</style>

<div class="noti-widget-wrapper">
    
    <a href="/approval" class="noti-card-item noti-card-long">
        <div class="noti-card-title">
            <i class="fa-solid fa-file-signature" style="color: #10b981;"></i> 사내결재 대기현황
        </div>
        <div style="display: flex; gap: 20px;">
            <div class="noti-card-value">
                연차 신청서 <span class="noti-count-red">{{ data.approval_vacation | default(0) }}</span>건
            </div>
            <div class="noti-card-value">
                기안서 <span class="noti-count-red">{{ data.approval_draft | default(0) }}</span>건
            </div>
        </div>
    </a>

    <div class="noti-grid-container">
        
        <a href="/document" class="noti-card-item">
            <div class="noti-card-title">
                <i class="fa-solid fa-id-card" style="color: #10b981;"></i> 증명서발급
            </div>
            <div class="noti-card-value">
                대기 <span class="noti-count-red">{{ data.cert_wait | default(0) }}</span>건
            </div>
        </a>
        
        <a href="/contract" class="noti-card-item">
            <div class="noti-card-title">
                <i class="fa-solid fa-file-contract" style="color: #10b981;"></i> 전자계약
            </div>
            <div class="noti-card-value">
                미계약 <span class="noti-count-red">{{ data.contract_miss | default(0) }}</span>건
            </div>
        </a>
        
        <a href="/board" class="noti-card-item">
            <div class="noti-card-title">
                <i class="fa-solid fa-clipboard-list" style="color: #10b981;"></i> 사내 게시판
            </div>
            <div class="noti-card-value">
                신규 <span class="noti-count-blue">{{ data.board_new | default(0) }}</span>건
            </div>
        </a>
        
        <a href="javascript:void(0)" onclick="if(document.getElementById('msgModal')) document.getElementById('msgModal').style.display='block'" class="noti-card-item">
            <div class="noti-card-title">
                <i class="fa-solid fa-envelope" style="color: #10b981;"></i> 시스템/쪽지
            </div>
            <div class="noti-card-value">
                신규 <span class="noti-count-blue">{{ data.message_new | default(0) }}</span>건
            </div>
        </a>
        
    </div>
</div>
