<style>
    /* =========================================================
       새담 인트라넷 [나의 업무 알림] 개선된 글래스모피즘 카드 스타일
       ========================================================= */
    .noti-widget-wrapper {
        background: transparent !important; /* 외부 컨테이너 배경 제거로 여백 최소화 */
        display: flex;
        flex-direction: column;
        gap: 15px;
        height: 100%;
        width: 100%;
        box-sizing: border-box;
    }
    
    .noti-card-item {
        background: var(--widget-bg) !important;
        border: 1px solid var(--card-border) !important;
        border-radius: 15px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        text-decoration: none;
        color: var(--text-dark) !important;
        box-shadow: var(--card-shadow);
        transition: all 0.3s ease;
    }
    
    .noti-card-item:hover {
        transform: translateY(-5px);
        background: var(--widget-hover) !important;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        border-color: var(--primary-color) !important;
    }
    
    /* 상단 긴 카드 (결재 현황) */
    .noti-card-long {
        flex-direction: row;
        justify-content: space-between;
        padding: 20px 30px;
        width: 100%;
    }
    
    .noti-card-title {
        font-size: 0.9rem;
        color: var(--text-gray);
        font-weight: 700;
        margin-bottom: 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .noti-card-title i {
        font-size: 1.2rem;
        color: var(--primary-color);
    }
    
    .noti-card-value {
        font-size: 1.15rem;
        font-weight: 800;
        color: var(--text-dark);
    }
    
    /* 강조 색상 */
    .noti-count-red { color: #ef4444; margin-left: 2px; } 
    .noti-count-blue { color: var(--primary-color); margin-left: 2px; }

    /* 그리드 컨테이너: 꽉 차게 배치 */
    .noti-grid-container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        flex: 1;
        width: 100%;
    }
    
    /* 아이콘 강조형 스타일 (그리드 내부) */
    .noti-grid-container .noti-card-item {
        padding: 20px 10px;
    }
    
    .noti-grid-container .noti-card-title {
        flex-direction: column;
        margin-bottom: 10px;
        font-size: 0.85rem;
    }

    .noti-grid-container .noti-card-title i {
        font-size: 1.6rem;
        margin-bottom: 5px;
    }
    
    @media (max-width: 1300px) {
        .noti-grid-container { grid-template-columns: repeat(2, 1fr); }
        .noti-card-long { flex-direction: column; align-items: flex-start; gap: 10px; }
    }
</style>

<div class="noti-widget-wrapper">
    
    <a href="/approval" class="noti-card-item noti-card-long">
        <div class="noti-card-title">
            <i class="fa-solid fa-file-signature"></i> 사내결재 대기현황
        </div>
        <div style="display: flex; gap: 25px;">
            <div class="noti-card-value">
                연차 신청 <span class="noti-count-red">{{ data.approval_vacation | default(0) }}</span><span style="font-size: 0.8rem; font-weight: 500;">건</span>
            </div>
            <div class="noti-card-value">
                기안문서 <span class="noti-count-red">{{ data.approval_draft | default(0) }}</span><span style="font-size: 0.8rem; font-weight: 500;">건</span>
            </div>
        </div>
    </a>

    <div class="noti-grid-container">
        
        <a href="/document" class="noti-card-item">
            <div class="noti-card-title">
                <i class="fa-solid fa-id-card"></i> 증명서발급
            </div>
            <div class="noti-card-value">
                대기 <span class="noti-count-red">{{ data.cert_wait | default(0) }}</span>건
            </div>
        </a>
        
        <a href="/contract" class="noti-card-item">
            <div class="noti-card-title">
                <i class="fa-solid fa-file-contract"></i> 전자계약
            </div>
            <div class="noti-card-value">
                미계약 <span class="noti-count-red">{{ data.contract_miss | default(0) }}</span>건
            </div>
        </a>
        
        <a href="/board" class="noti-card-item">
            <div class="noti-card-title">
                <i class="fa-solid fa-clipboard-list"></i> 게시판
            </div>
            <div class="noti-card-value">
                신규 <span class="noti-count-blue">{{ data.board_new | default(0) }}</span>건
            </div>
        </a>
        
        <a href="javascript:void(0)" onclick="if(document.getElementById('msgModal')) document.getElementById('msgModal').style.display='block'" class="noti-card-item">
            <div class="noti-card-title">
                <i class="fa-solid fa-envelope"></i> 쪽지함
            </div>
            <div class="noti-card-value">
                미확인 <span class="noti-count-blue">{{ data.message_new | default(0) }}</span>건
            </div>
        </a>
        
    </div>
</div>
