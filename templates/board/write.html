{% extends 'base.html' %}
{% block content %}
<style>
    /* CSS 기존 유지 */
    .write-box { max-width: 1000px; margin: 0 auto; background: #fff; padding: 40px; border: none solid #e2e8f0; border-radius: 12px; }
    .w-input { width: 100%; padding: 15px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 20px; font-size: 1rem; }
    .drop-zone { border: 2px dashed #cbd5e1; border-radius: 8px; padding: 40px; text-align: center; color: #64748b; background: #f8fafc; cursor: pointer; transition: 0.2s; margin-bottom: 20px;}
    .drop-zone.dragover { border-color: #3b82f6; background: #eff6ff; color: #3b82f6; }
    .file-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .file-item { display: flex; justify-content: space-between; background: #f1f5f9; padding: 10px 15px; border-radius: 6px; font-size: 0.9rem; }
    .file-remove { color: #ef4444; cursor: pointer; font-weight: bold; }
    .btn-wrap { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #e2e8f0; padding-top: 20px; margin-top: 10px; }
    .btn-basic { padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 0.95rem; transition: 0.2s; }
    .btn-cancel { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-submit { background: #1e3a8a; color: white; border: 1px solid #1e3a8a; }
    .btn-submit:hover { background: #1e40af; border-color: #1e40af; }
</style>

<div class="write-box">
    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 30px;">
        <h2 style="color: #1e293b; margin: 0;">{{ board.name_kr }} 글쓰기</h2>
        <!-- 💡 권한자(레벨 3 이하)에게만 공지 체크박스 노출 -->
        {% if session.get('user_level', 99) <= 3 %}
        <label style="font-weight: 700; color: #ef4444; cursor: pointer;">
            <input type="checkbox" id="isNotice" style="transform: scale(1.2); margin-right: 5px;"> 상단 고정 (공지)
        </label>
        {% endif %}
    </div>
    
    <input type="text" id="title" class="w-input" placeholder="제목을 입력하세요">
    <textarea id="content" class="w-input" style="height: 400px; resize: none;" placeholder="내용을 입력하세요"></textarea>
    
    <div id="dropZone" class="drop-zone">
        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 2rem; margin-bottom: 10px;"></i>
        <div>이곳에 파일을 드래그하여 놓거나 클릭하여 선택하세요.</div>
        <div style="font-size: 0.8rem; margin-top: 5px;">(최대 5개, 총 1.5GB 이하)</div>
        <input type="file" id="fileInput" multiple style="display: none;">
    </div>
    <div id="fileList" class="file-list"></div>

    <div class="btn-wrap">
        <button class="btn-basic btn-cancel" onclick="history.back()"><i class="fa-solid fa-xmark"></i> 취소</button>
        <button class="btn-basic btn-submit" onclick="submitPost()"><i class="fa-solid fa-pen"></i> 등록하기</button>
    </div>
</div>

<script>
    // 첨부파일 JS 기존 코드 유지
    let selectedFiles = [];
    const MAX_FILES = 5;
    const MAX_SIZE = 1.5 * 1024 * 1024 * 1024; // 1.5GB

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        let totalSize = selectedFiles.reduce((sum, f) => sum + f.size, 0);
        for (let file of files) {
            if (selectedFiles.length >= MAX_FILES) { alert('파일은 최대 5개까지만 첨부할 수 있습니다.'); break; }
            if (totalSize + file.size > MAX_SIZE) { alert('총 첨부파일 용량이 1.5GB를 초과할 수 없습니다.'); break; }
            selectedFiles.push(file);
            totalSize += file.size;
        }
        renderFileList();
    }

    function renderFileList() {
        const list = document.getElementById('fileList');
        list.innerHTML = '';
        selectedFiles.forEach((file, index) => {
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            list.innerHTML += `
                <div class="file-item">
                    <span><i class="fa-solid fa-file"></i> ${file.name} (${sizeMB} MB)</span>
                    <span class="file-remove" onclick="removeFile(${index})">X</span>
                </div>
            `;
        });
    }

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        renderFileList();
    }

    async function submitPost() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const isNoticeCheckbox = document.getElementById('isNotice');
        const isNotice = isNoticeCheckbox && isNoticeCheckbox.checked ? 1 : 0; // 공지 여부 가져오기
        
        if (!title || !content) return alert('제목과 내용을 입력하세요.');

        const formData = new FormData();
        formData.append('title', title);
        formData.append('content', content);
        formData.append('is_notice', isNotice); // 공지 데이터 전송 추가
        selectedFiles.forEach(file => formData.append('files[]', file));

        try {
            const res = await fetch('/board/{{ board.name_en }}/write', { method: 'POST', body: formData });
            const result = await res.json();
            if (res.ok) location.href = result.url;
            else alert(result.message);
        } catch (e) { alert('게시글 등록 중 오류가 발생했습니다.'); }
    }
</script>
{% endblock %}
