{% extends 'base.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
<style>
    /* 메인 페이지 전용 추가 스타일 (main.css에 넣으셔도 됩니다) */
    .dashboard-wrapper { display: flex; gap: 25px; margin-top: 10px; height: calc(100vh - 150px); }
    .calendar-container { flex: 7; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .today-sidebar { flex: 3; display: flex; flex-direction: column; gap: 20px; }
    .today-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); flex: 1; overflow-y: auto; }
    .event-item { border-left: 4px solid #4a90e2; background: #f8fbff; padding: 12px; margin-bottom: 10px; border-radius: 6px; transition: 0.2s; cursor: pointer; }
    .event-item:hover { background: #eef5ff; transform: translateX(5px); }
    .btn-add { width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-add:hover { background: #357abd; box-shadow: 0 5px 15px rgba(74,144,226,0.4); }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-wrapper">
    <section class="calendar-container">
        <div id='calendar'></div>
    </section>

    <aside class="today-sidebar">
        <button class="btn-add" onclick="openTaskModal()">
            <i class="fa-solid fa-plus"></i> 새 업무 등록
        </button>
        
        <div class="today-card">
            <h3 style="margin-top:0; color:#2c3e50;"><i class="fa-solid fa-clock" style="color:#4a90e2;"></i> 오늘의 일정</h3>
            <p id="current-date" style="font-size: 0.9em; color: #888; margin-bottom: 20px;"></p>
            <div id="today-list">
                <p style="text-align:center; color:#ccc; margin-top:50px;">오늘 등록된 업무가 없습니다.</p>
            </div>
        </div>
    </aside>
</div>

<div id="taskModal" class="modal" style="display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div class="modal-content" style="background:white; margin:10% auto; padding:30px; width:450px; border-radius:15px; position:relative;">
        <span onclick="closeTaskModal()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:20px;">&times;</span>
        <h2 id="modalTitle">업무 등록</h2>
        <form id="taskForm">
            <input type="date" id="taskDate" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:5px;">
            <select id="taskOwner" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:5px;">
                <option value="">담당자 선택</option>
                </select>
            <input type="text" id="insideTask" placeholder="내근업무" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:5px;">
            <input type="text" id="outsideTask" placeholder="외근업무" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:5px;">
            <textarea id="taskNote" placeholder="비고 및 기타사항" style="width:100%; height:80px; padding:10px; border:1px solid #ddd; border-radius:5px; margin-bottom:20px;"></textarea>
            <button type="button" onclick="saveTask()" style="width:100%; background:#28a745; color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; cursor:pointer;">저장하기</button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ko',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek'
            },
            events: '/get_tasks', // 기존 app_c.py 데이터 연동
            eventClick: function(info) {
                // 일정 클릭 시 수정 로직 (추후 구현)
                alert('담당자: ' + info.event.title);
            },
            dateClick: function(info) {
                openTaskModal(info.dateStr);
            }
        });
        calendar.render();
        loadTodayList();
    });

    function openTaskModal(date = '') {
        document.getElementById('taskModal').style.display = 'block';
        if(date) document.getElementById('taskDate').value = date;
    }

    function closeTaskModal() {
        document.getElementById('taskModal').style.display = 'none';
    }

    async function loadTodayList() {
        const res = await fetch('/get_tasks');
        const tasks = await res.json();
        const today = new Date().toISOString().split('T')[0];
        const listEl = document.getElementById('today-list');
        
        const todayTasks = tasks.filter(t => t.start === today);
        if(todayTasks.length > 0) {
            listEl.innerHTML = '';
            todayTasks.forEach(t => {
                listEl.innerHTML += `
                    <div class="event-item">
                        <strong style="color:#4a90e2;">${t.extendedProps.owner}</strong>
                        <div style="font-size:0.9em; margin-top:5px;">🏠 ${t.extendedProps.inside || '내근 없음'}</div>
                        <div style="font-size:0.9em;">🚗 ${t.extendedProps.outside || '외근 없음'}</div>
                    </div>
                `;
            });
        }
    }

    async function saveTask() {
        const data = {
            date: document.getElementById('taskDate').value,
            owner: document.getElementById('taskOwner').value,
            inside: document.getElementById('insideTask').value,
            outside: document.getElementById('outsideTask').value,
            meeting: '',
            note: document.getElementById('taskNote').value
        };

        const res = await fetch('/save_task', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        if(res.ok) {
            alert("업무가 등록되었습니다.");
            location.reload();
        }
    }
</script>
{% endblock %}
