<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>업무보고 달력</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #calendar { margin-top: 20px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; }
        .btn-download { padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h2>🗓️ 월간 업무보고표</h2>
            <a href="/download" class="btn-download">📥 엑셀 다운로드</a>
        </div>
        <div id='calendar'></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                events: '/get_tasks',
                dateClick: async function(info) {
                    let owner = prompt("담당자 성함을 입력하세요:");
                    if(!owner) return;
                    let title = prompt("업무내용을 입력하세요:");
                    let category = prompt("구분 (예: 교육, 행정, 기타):");
                    let note = prompt("비고:");
                    let etc = prompt("기타사항:");

                    try {
                        const response = await fetch('/save_task', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                date: info.dateStr,
                                owner: owner,
                                title: title,
                                category: category,
                                note: note,
                                etc: etc
                            })
                        });

                        if (response.ok) {
                            calendar.refetchEvents();
                            alert("엑셀 디스크에 저장되었습니다.");
                        } else {
                            alert("저장 실패! 서버 로그를 확인하세요.");
                        }
                    } catch (e) {
                        alert("네트워크 오류가 발생했습니다.");
                    }
                },
                eventClick: function(info) {
                    let p = info.event.extendedProps;
                    alert(`[상세 업무 보고]\n\n날짜: ${info.event.startStr}\n담당자: ${p.owner}\n구분: ${p.category}\n내용: ${info.event.title}\n비고: ${p.note}\n기타: ${p.etc}`);
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
