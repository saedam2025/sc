<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>새담 인트라넷 - 메인</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <style>
        .dashboard-container { display: flex; gap: 20px; padding: 20px; background-color: #f4f7fc; min-height: 100vh; }
        .calendar-section { flex: 7; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .today-section { flex: 3; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .event-card { border-left: 5px solid #4a90e2; background: #f8f9fa; padding: 15px; margin-bottom: 10px; border-radius: 8px; font-size: 0.9em; }
        /* 모달 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 400px; border-radius: 10px; }
        input, select, textarea { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-logo">새담 인트라넷</a>
        <ul class="nav-menu">
            <li><a href="/">메인달력</a></li>
            <li><a href="/user">회원관리</a></li>
            <li><a href="/approval">사내결재</a></li>
            <li><a href="/document">증명서발급</a></li>
            <li><a href="/contract">전자계약</a></li>
        </ul>
    </div>
</nav>

<div class="dashboard-container">
    <div class="calendar-section">
        <div id='calendar'></div>
    </div>

    <div class="today-section">
        <h3 style="color: #4a90e2;">TODAY <span id="today-date" style="font-size: 0.7em; color: #999;"></span></h3>
        <div id="today-list">
            </div>
        <hr>
        <button onclick="openModal()" style="width:100%; padding:10px; background:#4a90e2; color:white; border:none; border-radius:5px; cursor:pointer;">+ 새 업무 등록</button>
    </div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">업무 등록/수정</h3>
        <input type="date" id="taskDate">
        <select id="taskOwner">
            <option value="">담당자 선택</option>
            </select>
        <input type="text" id="insideTask" placeholder="내근업무">
        <input type="text" id="outsideTask" placeholder="외근업무">
        <input type="text" id="meetingTask" placeholder="회의">
        <textarea id="taskNote" placeholder="비고"></textarea>
        <div id="passwordArea" style="display:none;">
            <input type="password" id="ownerPass" placeholder="수정 암호">
        </div>
        <button onclick="saveTask()" id="saveBtn" style="width:100%; padding:10px; background:#28a745; color:white; border:none;">저장하기</button>
        <button onclick="closeModal()" style="width:100%; margin-top:5px; padding:10px; background:#6c757d; color:white; border:none;">닫기</button>
    </div>
</div>

<script>
    let calendar;
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        document.getElementById('today-date').innerText = new Date().toLocaleDateString();

        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ko',
            headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
            events: '/get_tasks', // 기존 app_c.py의 경로와 연동
            eventClick: function(info) {
                editTask(info.event);
            },
            dateClick: function(info) {
                openModal(info.dateStr);
            }
        });
        calendar.render();
        loadOwners();
        loadTodayTasks();
    });

    async function loadOwners() {
        const res = await fetch('/user/list');
        const users = await res.json();
        const sel = document.getElementById('taskOwner');
        users.forEach(u => {
            if(u.승인상태 === '승인') {
                const opt = document.createElement('option');
                opt.value = u.이름;
                opt.text = u.이름;
                sel.add(opt);
            }
        });
    }

    async function loadTodayTasks() {
        const res = await fetch('/get_tasks');
        const tasks = await res.json();
        const today = new Date().toISOString().split('T')[0];
        const listEl = document.getElementById('today-list');
        
        const todayTasks = tasks.filter(t => t.start === today);
        listEl.innerHTML = todayTasks.length ? '' : '<p style="color:#ccc;">오늘 일정이 없습니다.</p>';
        
        todayTasks.forEach(t => {
            listEl.innerHTML += `
                <div class="event-card">
                    <strong>${t.title}</strong><br>
                    <small>${t.extendedProps.inside || t.extendedProps.outside}</small>
                </div>`;
        });
    }

    function openModal(date = '') {
        document.getElementById('taskModal').style.display = 'block';
        if(date) document.getElementById('taskDate').value = date;
        document.getElementById('passwordArea').style.display = 'none';
        document.getElementById('modalTitle').innerText = "새 업무 등록";
    }

    function closeModal() {
        document.getElementById('taskModal').style.display = 'none';
    }

    async function saveTask() {
        const data = {
            date: document.getElementById('taskDate').value,
            owner: document.getElementById('taskOwner').value,
            inside: document.getElementById('insideTask').value,
            outside: document.getElementById('outsideTask').value,
            meeting: document.getElementById('meetingTask').value,
            note: document.getElementById('taskNote').value
        };

        const res = await fetch('/contract/save_task', { // 수정된 경로
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        if(res.ok) {
            alert("저장되었습니다.");
            location.reload();
        }
    }
</script>
</body>
</html>
