<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새담 업무 관리 시스템 - 시각화 분석 모드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <style>
        :root { --primary: #0d6efd; --sunday: #e74c3c; --saturday: #3498db; --chart-bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .main-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; max-width: 1600px; margin: auto; }
        
        /* 사이드바 */
        .sidebar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); height: fit-content; }
        .sidebar h4 { margin: 0 0 15px 0; font-size: 16px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .owner-list { list-style: none; padding: 0; margin-bottom: 15px; max-height: 200px; overflow-y: auto; }
        .owner-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #f8f9fa; font-size: 13px; border-radius: 4px; }
        .owner-item:hover { background: #f0f7ff; color: var(--primary); font-weight: bold; }
        
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; margin-bottom: 8px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #198754; color: white; }
        .btn-info { background: #0dcaf0; color: white; }
        .btn-dark { background: #343a40; color: white; }

        /* 달력 스타일 (토/일 색상) */
        .calendar-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .fc-day-sun a { color: var(--sunday) !important; }
        .fc-day-sat a { color: var(--saturday) !important; }
        .holiday-label { font-size: 10px; color: var(--sunday); margin-left: 5px; font-weight: bold; }
        .fc-daygrid-day-top { flex-direction: row !important; }
        .badge { padding: 1px 3px; border-radius: 3px; font-size: 9px; color: white; margin-left: 2px; }

        /* 모달 스타일 */
        .modal { display: none; position: fixed; z-index: 9999; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); }
        .modal-content { background: white; margin: 3% auto; padding: 25px; width: 500px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        h3 { margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 13px; font-family: inherit; }
        textarea { height: 80px; resize: none; }
        .btn-group { text-align: right; margin-top: 20px; }
        .btn-group .btn { width: auto; margin-left: 8px; }
        
        .summary-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .summary-table th, .summary-table td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .summary-table th { background: #f8f9fa; }
        
        /* [2번 기능] 통계 대시보드 스타일 */
        .stats-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .stats-card { background: white; border: 1px solid #eee; border-radius: 8px; padding: 15px; }
        .stats-title { font-size: 13px; font-weight: bold; color: #666; margin-bottom: 10px; }
        .stats-value { font-size: 24px; font-weight: bold; color: var(--primary); }
        .chart-container { height: 250px; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="sidebar">
        <h4>👥 담당자 목록</h4>
        <ul id="ownerList" class="owner-list"></ul>
        
        <div style="margin-bottom:10px;">
            <input type="text" id="newOwnerInput" placeholder="신규 담당자명" style="padding:8px; border:1px solid #ddd; border-radius:4px; margin-bottom:5px; width:100%; box-sizing:border-box;">
            <input type="password" id="ownerPassInput" placeholder="담당자 개인 암호 설정" style="padding:8px; border:1px solid #ddd; border-radius:4px; margin-bottom:5px; width:100%; box-sizing:border-box;">
        </div>
        <button class="btn btn-primary" onclick="addOwnerWithAuth()">담당자 등록 (관리자암호필요)</button>
        <hr style="margin: 20px 0;">
        <button class="btn btn-success" onclick="viewSchoolSummary()">🏫 학교방문 요약 리스트</button>
        <button class="btn btn-info" onclick="viewAdvancedSchoolStats()">📊 학교방문요약통계표</button>
        <a href="/download" style="text-decoration:none;"><button class="btn btn-dark">📥 엑셀 다운로드</button></a>
    </div>

    <div class="calendar-card"><div id='calendar'></div></div>
</div>

<div id="inputModal" class="modal">
    <div class="modal-content">
        <h3>업무 등록</h3>
        <input type="hidden" id="selectedDate">
        
        <div class="form-group">
            <label>담당자 선택</label>
            <select id="ownerSelect"></select>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
            <div><label>내근업무</label><textarea id="inside"></textarea></div>
            <div><label>외근업무</label><textarea id="outside" placeholder="예: 이의초 방문"></textarea></div>
        </div>
        
        <div class="form-group"><label>회의/면접</label><textarea id="meeting" style="height:50px;"></textarea></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
            <div><label>비고</label><input type="text" id="note"></div>
            <div><label>기타</label><input type="text" id="etc"></div>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-dark" onclick="closeModal('inputModal')">취소</button>
            <button class="btn btn-primary" onclick="saveTask()">데이터 저장</button>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>업무 내용 수정</h3>
        <input type="hidden" id="editTaskId"> 
        
        <div class="form-group">
            <label>날짜 / 담당자</label>
            <div style="font-size:13px; color:#333; background:#f8f9fa; padding:10px; border-radius:4px;">
                <span id="editDateDisplay"></span> | <strong id="editOwnerDisplay" style="color:var(--primary);"></strong>
            </div>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
            <div><label>내근업무</label><textarea id="editInside"></textarea></div>
            <div><label>외근업무</label><textarea id="editOutside"></textarea></div>
        </div>
        
        <div class="form-group"><label>회의/면접</label><textarea id="editMeeting" style="height:50px;"></textarea></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
            <div><label>비고</label><input type="text" id="editNote"></div>
            <div><label>기타</label><input type="text" id="editEtc"></div>
        </div>
        
        <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">
        
        <div class="form-group">
            <label>담당자 개인 암호 확인 (본인 확인)</label>
            <input type="password" id="editOwnerPassword" placeholder="등록 시 설정한 암호 입력" style="border: 2px solid var(--sunday);">
        </div>
        
        <div class="btn-group">
            <button class="btn btn-dark" onclick="closeModal('editModal')">닫기</button>
            <button class="btn btn-danger" onclick="updateTask()">수정 완료</button>
        </div>
    </div>
</div>

<div id="summaryModal" class="modal">
    <div class="modal-content" style="width: 800px;">
        <h3 id="summaryTitle">상세 정보 조회</h3>
        <div id="summaryContent"></div>
        <div class="btn-group"><button class="btn btn-dark" onclick="closeModal('summaryModal')">창 닫기</button></div>
    </div>
</div>

<script>
    var calendar;
    // 차트 객체를 저장하는 변수 (매번 파괴 후 다시 그려야 함)
    var pieChart, barChart; 

    // 고정 공휴일 설정
    const holidays = {
        "01-01": "신정", "03-01": "삼일절", "05-05": "어린이날", "06-06": "현충일",
        "08-15": "광복절", "10-03": "개천절", "10-09": "한글날", "12-25": "성탄절"
    };

    document.addEventListener('DOMContentLoaded', function() { initCalendar(); refreshOwners(); });

    function initCalendar() {
        var calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth', locale: 'ko', events: '/get_tasks',
            dateClick: function(info) {
                document.getElementById('selectedDate').value = info.dateStr;
                // 이전 입력 내용 초기화
                document.querySelectorAll('#inputModal textarea, #inputModal input:not([type=hidden])').forEach(el=>el.value='');
                document.getElementById('inputModal').style.display = 'block';
            },
            dayCellDidMount: function(info) {
                // 주말 및 공휴일 처리
                let dateStr = info.date.toISOString().split('T')[0].substring(5, 10);
                if (holidays[dateStr]) {
                    let holidaySpan = document.createElement('span');
                    holidaySpan.className = 'holiday-label'; holidaySpan.innerText = holidays[dateStr];
                    info.el.querySelector('.fc-daygrid-day-top').appendChild(holidaySpan);
                    info.el.querySelector('.fc-daygrid-day-number').style.color = 'var(--sunday)';
                }
            },
            // [1번 버그 수정요망] 입력 내용에 따라 아이콘 분리 표시
            eventContent: function(arg) {
                let p = arg.event.extendedProps;
                let html = `<div style="padding:1px;"><b style="font-size:11px;">${p.owner}</b>`;
                
                // 각 항목의 내용 유무를 확인하여 아이콘 생성
                if(hasContent(p.inside))    html += `<span class="badge" style="background:#0d6efd">내</span>`;
                if(hasContent(p.outside))   html += `<span class="badge" style="background:#dc3545">외</span>`;
                if(hasContent(p.meeting))   html += `<span class="badge" style="background:#6610f2">회</span>`;
                if(hasContent(p.interview)) html += `<span class="badge" style="background:#e83e8c">면</span>`;
                if(hasContent(p.note))      html += `<span class="badge" style="background:#fd7e14">비</span>`;
                if(hasContent(p.etc))       html += `<span class="badge" style="background:#20c997">기</span>`;
                
                html += `</div>`;
                return { html: html };
            },
            // [3, 4번 기능] 달력에서 입력한 내용을 클릭하면 수정창 띄움
            eventClick: function(info) {
                const event = info.event;
                const p = event.extendedProps;
                
                // 수정 모달에 데이터 로드
                document.getElementById('editTaskId').value = event.id; // 엑셀 행 번호
                document.getElementById('editDateDisplay').innerText = event.startStr;
                document.getElementById('editOwnerDisplay').innerText = p.owner;
                
                // 직접 내용을 보고 수정할 수 있게 인풋에 로드
                document.getElementById('editInside').value = p.inside || '';
                document.getElementById('editOutside').value = p.outside || '';
                document.getElementById('editMeeting').value = p.meeting || '';
                document.getElementById('editNote').value = p.note || '';
                document.getElementById('editEtc').value = p.etc || '';
                
                // 암호 입력 필드 초기화
                document.getElementById('editOwnerPassword').value = '';
                
                document.getElementById('editModal').style.display = 'block';
            }
        });
        calendar.render();
    }

    // 내용 유무 판단 함수 (빈 문자열, 공백 제외)
    function hasContent(txt) {
        return txt && txt.toString().trim() !== "";
    }

    async function refreshOwners() {
        const res = await fetch('/get_owners');
        const owners = await res.json();
        const listEl = document.getElementById('ownerList');
        const selectEl = document.getElementById('ownerSelect');
        listEl.innerHTML = ''; selectEl.innerHTML = '<option value="">담당자 선택</option>';
        owners.forEach(name => {
            const li = document.createElement('li'); li.className = 'owner-item'; li.innerText = name;
            li.onclick = () => viewOwnerHistory(name); listEl.appendChild(li);
            const opt = document.createElement('option'); opt.value = name; opt.innerText = name;
            selectEl.appendChild(opt);
        });
    }

    // [3번 기능] 담당자 등록 시 개인 암호도 함께 등록
    async function addOwnerWithAuth() {
        const name = document.getElementById('newOwnerInput').value;
        const ownerPass = document.getElementById('ownerPassInput').value;
        if(!name || !ownerPass) return alert("담당자 성함과 사용할 개인 암호를 모두 입력하세요.");
        
        const adminPass = prompt("관리자 암호(1900)를 입력하세요:");
        if(!adminPass) return;

        const res = await fetch('/add_owner', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            // 관리자 암호와 개인 암호를 함께 전송
            body: JSON.stringify({name, owner_pass: ownerPass, admin_pass: adminPass}) 
        });
        
        if(res.ok) {
            document.getElementById('newOwnerInput').value = '';
            document.getElementById('ownerPassInput').value = '';
            refreshOwners();
            alert("정상 등록되었습니다.");
        } else {
            const err = await res.json();
            alert(err.message);
        }
    }

    // [2번 기능 수정요망] 멋진 내용의 시각화 통계 대시보드
    async function viewAdvancedSchoolStats() {
        const contentEl = document.getElementById('summaryContent');
        contentEl.innerHTML = `<div style="text-align:center; padding:30px; font-size:13px; color:#666;">📊 데이터를 분석하고 시각화 차트를 그리는 중입니다...</div>`;
        
        document.getElementById('summaryTitle').innerText = `📊 새담 학교방문요약 통합 대시보드`;
        document.getElementById('summaryModal').style.display = 'block';
        
        const res = await fetch('/get_school_stats');
        const data = await res.json();
        
        if (data.status === "empty" || !data.pie) {
            contentEl.innerHTML = `<div style="text-align:center; padding:50px; border:1px solid #eee; border-radius:8px; margin-top:20px; font-size:14px; color:#999;">🏫 학교 방문 외근 기록이 없습니다.</div>`;
            return;
        }

        // 멋진 대시보드 레이아웃 생성
        let html = `
            <div class="stats-dashboard">
                <div class="stats-card" style="grid-column: 1 / -1; display:flex; justify-content:space-around; text-align:center;">
                    <div><div class="stats-title">총 학교방문 건수</div><div class="stats-value">${data.total_visits}건</div></div>
                    <div><div class="stats-title">방문 학교 수 (종류)</div><div class="stats-value">${data.unique_schools}개교</div></div>
                </div>
                
                <div class="stats-card">
                    <div class="stats-title">🎨 학교별 방문 점유율 (빈도 비율)</div>
                    <div class="chart-container"><canvas id="schoolPieChart"></canvas></div>
                </div>
                
                <div class="stats-card">
                    <div class="stats-title">🏆 방문횟수 TOP 5 학교</div>
                    <div class="chart-container"><canvas id="top5BarChart"></canvas></div>
                </div>
            </div>
        `;
        
        contentEl.innerHTML = html;
        
        // 차트 그리기 로직 (Chart.js 사용)
        setTimeout(() => {
            if (pieChart) pieChart.destroy();
            if (barChart) barChart.destroy();
            
            // Pie 차트 (점유율)
            const ctxPie = document.getElementById('schoolPieChart').getContext('2d');
            pieChart = new Chart(ctxPie, {
                type: 'doughnut', // 도넛형이 더 멋짐
                data: data.pie,
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth:12, font:{size:11} } } } }
            });
            
            // Bar 차트 (TOP 5)
            const ctxBar = document.getElementById('top5BarChart').getContext('2d');
            barChart = new Chart(ctxBar, {
                type: 'bar',
                data: data.top5,
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
            });
        }, 50); // DOM 렌더링 후 차트를 그리기 위한 약간의 지연
    }

    async function viewSchoolSummary() {
        const res = await fetch('/get_tasks');
        const tasks = await res.json();
        const schools = tasks.filter(t => ['초','중','고','학교'].some(k => (t.extendedProps.outside||'').includes(k)));
        let html = `<table class="summary-table"><thead><tr><th>날짜</th><th>외근업무 상세</th><th>담당자</th></tr></thead><tbody>`;
        schools.forEach(t => {
            html += `<tr><td>${t.start}</td><td>${t.extendedProps.outside||''}</td><td>${t.extendedProps.owner}</td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('summaryTitle').innerText = `🏫 학교방문 요약 리스트`;
        document.getElementById('summaryContent').innerHTML = html || '기록 없음';
        document.getElementById('summaryModal').style.display = 'block';
    }

    async function viewOwnerHistory(name) {
        const res = await fetch('/get_tasks');
        const tasks = await res.json();
        const filtered = tasks.filter(t => t.extendedProps.owner === name);
        let html = `<table class="summary-table"><thead><tr><th>날짜</th><th>내근</th><th>외근</th><th>비고</th></tr></thead><tbody>`;
        filtered.forEach(t => { const p = t.extendedProps; html += `<tr><td>${t.start}</td><td>${p.inside||''}</td><td>${p.outside||''}</td><td>${p.note||''}</td></tr>`; });
        html += `</tbody></table>`;
        document.getElementById('summaryTitle').innerText = `${name} 님의 업무 기록`;
        document.getElementById('summaryContent').innerHTML = filtered.length > 0 ? html : '기록 없음';
        document.getElementById('summaryModal').style.display = 'block';
    }

    async function saveTask() {
        const payload = {
            date: document.getElementById('selectedDate').value,
            owner: document.getElementById('ownerSelect').value,
            inside: document.getElementById('inside').value,
            outside: document.getElementById('outside').value,
            meeting: document.getElementById('meeting').value,
            note: document.getElementById('note').value,
            etc: document.getElementById('etc').value,
            interview: '' 
        };
        if(!payload.owner) return alert("담당자를 선택해 주세요.");
        const res = await fetch('/save_task', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        if(res.ok) { location.reload(); }
    }

    // [3, 4번 기능] 개인 암호 확인 후 업무 수정 완료
    async function updateTask() {
        const payload = {
            id: document.getElementById('editTaskId').value, // 엑셀 행 ID
            owner: document.getElementById('editOwnerDisplay').innerText,
            inside: document.getElementById('editInside').value,
            outside: document.getElementById('editOutside').value,
            meeting: document.getElementById('editMeeting').value,
            note: document.getElementById('editNote').value,
            etc: document.getElementById('editEtc').value,
            interview: '',
            // [3번 기능] 담당자 인증을 위한 개인 암호
            password: document.getElementById('editOwnerPassword').value 
        };
        
        if(!payload.password) return alert("수정하려면 본인의 개인 암호를 입력하세요.");
        
        const res = await fetch('/update_task', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(payload) 
        });
        
        if(res.ok) { 
            alert("수정되었습니다.");
            location.reload(); 
        } else {
            const err = await res.json();
            alert("❌ 수정 실패: " + err.message); // 암호 틀림 등의 에러 표시
        }
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>```
