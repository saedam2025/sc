<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>업무보고 달력</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #calendar { margin-top: 20px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; }
        .btn-download { padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        
        /* 커스텀 모달 스타일 */
        #inputModal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 400px; border-radius: 10px; }
        .modal-content input, .modal-content textarea { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }
        .modal-content textarea { height: 100px; resize: vertical; }
        .btn-group { text-align: right; }
        .btn-save { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        
        /* 달력 내 줄바꿈 허용 */
        .fc-event-title { white-space: pre-wrap !important; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h2>🗓️ 월간 업무보고표</h2>
            <a href="/download" class="btn-download">📥 엑셀 다운로드</a>
        </div>
        <div id='calendar'></div>
    </div>

    <div id="inputModal">
        <div class="modal-content">
            <h3>업무 등록</h3>
            <input type="hidden" id="selectedDate">
            <label>담당자</label>
            <input type="text" id="owner" placeholder="성함 입력">
            <label>구분</label>
            <input type="text" id="category" placeholder="예: 행정, 교육">
            <label>업무내용 (Enter로 줄바꿈 가능)</label>
            <textarea id="title" placeholder="상세 업무 내용을 입력하세요"></textarea>
            <label>비고</label>
            <input type="text" id="note">
            <label>기타</label>
            <input type="text" id="etc">
            <div class="btn-group">
                <button class="btn-cancel" onclick="closeModal()">취소</button>
                <button class="btn-save" onclick="saveData()">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        var calendar;

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                events: '/get_tasks',
                dateClick: function(info) {
                    document.getElementById('selectedDate').value = info.dateStr;
                    document.getElementById('inputModal').style.display = 'block';
                },
                eventClick: function(info) {
                    let p = info.event.extendedProps;
                    alert(`[상세 업무 보고]\n\n날짜: ${info.event.startStr}\n담당자: ${p.owner}\n구분: ${p.category}\n내용:\n${info.event.title.replace(/^\[.*?\] /, '')}\n\n비고: ${p.note}\n기타: ${p.etc}`);
                }
            });
            calendar.render();
        });

        function closeModal() {
            document.getElementById('inputModal').style.display = 'none';
            // 입력필드 초기화
            document.getElementById('owner').value = '';
            document.getElementById('title').value = '';
            document.getElementById('category').value = '';
            document.getElementById('note').value = '';
            document.getElementById('etc').value = '';
        }

        async function saveData() {
            const date = document.getElementById('selectedDate').value;
            const owner = document.getElementById('owner').value;
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const note = document.getElementById('note').value;
            const etc = document.getElementById('etc').value;

            if(!owner || !title) {
                alert("담당자와 업무내용은 필수입니다.");
                return;
            }

            try {
                const response = await fetch('/save_task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        date: date,
                        owner: owner,
                        title: title,
                        category: category,
                        note: note,
                        etc: etc
                    })
                });

                if (response.ok) {
                    calendar.refetchEvents();
                    closeModal();
                } else {
                    alert("저장 실패!");
                }
            } catch (e) {
                alert("에러 발생!");
            }
        }
    </script>
</body>
</html>
