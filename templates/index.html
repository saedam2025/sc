<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>업무보고 시스템</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background-color: #f4f7f9; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-download { padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; }

        /* --- [아이콘/배지 스타일] --- */
        .fc-event { background: transparent !important; border: none !important; cursor: pointer; }
        .event-container { display: flex; align-items: center; gap: 4px; padding: 2px; }
        .owner-name { font-weight: bold; font-size: 12px; color: #333; margin-right: 4px; }
        
        .badge { 
            padding: 2px 5px; 
            border-radius: 4px; 
            font-size: 10px; 
            color: white; 
            font-weight: bold;
            display: inline-block;
        }
        .bg-work { background-color: #007bff; } /* 업무 - 파랑 */
        .bg-cat  { background-color: #6f42c1; } /* 구분 - 보라 */
        .bg-note { background-color: #fd7e14; } /* 비고 - 주황 */
        .bg-etc  { background-color: #20c997; } /* 기타 - 민트 */

        /* 모달 스타일 */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; width: 420px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .modal-header { font-size: 1.2em; font-weight: bold; color: #007bff; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .detail-item { margin-bottom: 12px; display: flex; align-items: flex-start; }
        .detail-label { width: 70px; font-weight: bold; color: #777; font-size: 0.9em; }
        .detail-value { flex: 1; white-space: pre-wrap; color: #333; }
        .detail-box { background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-top: 5px; min-height: 40px; }

        input, textarea { width: 100%; margin-bottom: 12px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 100px; }
        .btn-group { text-align: right; margin-top: 15px; }
        .btn { padding: 8px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #007bff; color: white; margin-left: 8px; }
        .btn-close { background: #6c757d; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>🗓️ 업무보고 관리 (아이콘 모드)</h2>
        <a href="/download" class="btn-download">📥 엑셀 다운로드</a>
    </div>
    <div id='calendar'></div>
</div>

<div id="inputModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">새 업무 등록</div>
        <input type="hidden" id="selectedDate">
        <input type="text" id="owner" placeholder="담당자 성함">
        <input type="text" id="category" placeholder="구분 (예: 행정, 교육)">
        <textarea id="title" placeholder="상세 업무 내용"></textarea>
        <input type="text" id="note" placeholder="비고">
        <input type="text" id="etc" placeholder="기타">
        <div class="btn-group">
            <button class="btn btn-close" onclick="closeModal('inputModal')">취소</button>
            <button class="btn btn-save" onclick="saveData()">저장</button>
        </div>
    </div>
</div>

<div id="viewModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">업무 상세 정보</div>
        <div class="detail-item"><span class="detail-label">날짜:</span><span id="v-date" class="detail-value"></span></div>
        <div class="detail-item"><span class="detail-label">담당자:</span><span id="v-owner" class="detail-value"></span></div>
        <div class="detail-item"><span class="detail-label">구분:</span><span id="v-category" class="detail-value"></span></div>
        <div class="detail-label">상세내용:</div>
        <div id="v-title" class="detail-value detail-box"></div>
        <div id="v-note-area" style="margin-top:10px;"><span class="detail-label">비고:</span><span id="v-note" class="detail-value"></span></div>
        <div id="v-etc-area"><span class="detail-label">기타:</span><span id="v-etc" class="detail-value"></span></div>
        <div class="btn-group">
            <button class="btn btn-close" onclick="closeModal('viewModal')">닫기</button>
        </div>
    </div>
</div>

<script>
    var calendar;

    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ko',
            events: '/get_tasks',
            // --- [핵심: 아이콘 형식으로 표시] ---
            eventContent: function(arg) {
                let p = arg.event.extendedProps;
                let html = `<div class="event-container">`;
                html += `<span class="owner-name">${p.owner}</span>`;
                
                // 내용이 있을 때만 아이콘(배지) 추가
                if(p.category) html += `<span class="badge bg-cat">구분</span>`;
                if(arg.event.title) html += `<span class="badge bg-work">업무</span>`;
                if(p.note)     html += `<span class="badge bg-note">비고</span>`;
                if(p.etc)      html += `<span class="badge bg-etc">기타</span>`;
                
                html += `</div>`;
                return { html: html };
            },
            dateClick: function(info) {
                document.getElementById('selectedDate').value = info.dateStr;
                document.getElementById('inputModal').style.display = 'block';
            },
            eventClick: function(info) {
                let p = info.event.extendedProps;
                document.getElementById('v-date').innerText = info.event.startStr;
                document.getElementById('v-owner').innerText = p.owner;
                document.getElementById('v-category').innerText = p.category || '-';
                document.getElementById('v-title').innerText = info.event.title || '-';
                
                document.getElementById('v-note-area').style.display = p.note ? 'block' : 'none';
                document.getElementById('v-note').innerText = p.note || '';
                document.getElementById('v-etc-area').style.display = p.etc ? 'block' : 'none';
                document.getElementById('v-etc').innerText = p.etc || '';

                document.getElementById('viewModal').style.display = 'block';
            }
        });
        calendar.render();
    });

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function saveData() {
        const data = {
            date: document.getElementById('selectedDate').value,
            owner: document.getElementById('owner').value,
            title: document.getElementById('title').value,
            category: document.getElementById('category').value,
            note: document.getElementById('note').value,
            etc: document.getElementById('etc').value
        };
        if(!data.owner) return alert("담당자 성함은 필수입니다.");

        const res = await fetch('/save_task', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if(res.ok) { calendar.refetchEvents(); closeModal('inputModal'); location.reload(); }
    }
</script>
</body>
</html>
