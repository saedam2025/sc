{% extends 'base.html' %}

{% block content %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>

<style>
    .dashboard-container { padding: 0 0 20px 0; background-color: transparent; font-family: 'Pretendard', sans-serif; }
    .glass-box { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); padding: 20px; }
    
    .approval-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .btn-new-draft { background: #4a90e2; color: white; padding: 10px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3); }
    .btn-new-draft:hover { background: #357abd; transform: translateY(-2px); }

    .nav-tabs { display: flex; gap: 20px; border-bottom: 2px solid #dee2e6; margin-bottom: 20px; }
    .nav-tab { padding: 10px 5px; font-weight: bold; color: #adb5bd; cursor: pointer; transition: 0.2s; position: relative; }
    .nav-tab.active { color: #4a90e2; }
    .nav-tab.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: #4a90e2; border-radius: 3px; }

    .search-wrap { display: flex; justify-content: flex-end; margin-bottom: 15px; }
    .search-input { padding: 10px 15px; width: 250px; border: 1px solid #ced4da; border-radius: 20px; font-size: 0.9em; outline: none; transition: 0.2s; }
    .search-input:focus { border-color: #4a90e2; box-shadow: 0 0 5px rgba(74, 144, 226, 0.3); }
    .page-btn { padding: 6px 12px; margin: 0 4px; border: 1px solid #dee2e6; border-radius: 5px; background: white; cursor: pointer; color: #495057; font-weight: bold; transition: 0.2s; }
    .page-btn:hover { background: #f8f9fa; }
    .page-btn.active { background: #4a90e2; color: white; border-color: #4a90e2; }

    .approval-table { width: 100%; border-collapse: collapse; text-align: left; }
    .approval-table th { background: rgba(248, 249, 250, 0.5); padding: 15px; color: #495057; border-bottom: 1px solid #dee2e6; font-size: 0.9em; }
    .approval-table td { padding: 15px; border-bottom: 1px solid #f1f3f5; font-size: 0.95em; color: #333; cursor: pointer; transition: 0.2s; }
    .approval-table tbody tr:hover { background: rgba(255, 255, 255, 0.8); }
    
    .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; }
    .st-대기 { background: #fff3cd; color: #f59f00; }
    .st-1차승인 { background: #e7f5ff; color: #228be6; }
    .st-완료 { background: #d3f9d8; color: #2b8a3e; }
    .st-반려 { background: #ffe3e3; color: #c92a2a; }

    /* 모달 기본 스타일 (높이는 JS에서 동적으로 제어) */
    .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); }
    .modal-content { background: white; margin: 5% auto; padding: 30px; width: 850px; max-width: 95vw; border-radius: 20px; position: relative; overflow-y: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.2); transition: all 0.3s ease-in-out; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: bold; color: #495057; margin-bottom: 5px; font-size: 0.9em; }
    .form-control { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; background: #f8f9fa; }
    .form-control:focus { outline: none; border-color: #4a90e2; background: white; }

    .action-btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
    .btn-approve { background: #28a745; }
    .btn-reject { background: #dc3545; }
    
    .detail-box { background: white; padding: 30px; border-radius: 8px; border: 1px solid #ced4da; margin-bottom: 20px; line-height: 1.6; overflow-x: auto; min-height: 500px; }

    .note-editable table, .detail-box table { border-collapse: collapse; width: 100%; margin-bottom: 15px; }
    .note-editable table td, .note-editable table th, .detail-box table td, .detail-box table th { border: 1px solid #ced4da; padding: 8px; }

    .receiver-box { border: 1px solid #ced4da; border-radius: 8px; height: 120px; overflow-y: auto; padding: 10px; background: white; }
    .receiver-box label { display: block; margin-bottom: 8px; font-weight: normal; cursor: pointer; }
    .receiver-box input[type="checkbox"] { margin-right: 8px; transform: scale(1.2); }

/* 에디터 이미지 첨부 팝업 z-index 충돌 해결 */
    .note-modal { z-index: 10001 !important; }
    .note-modal-backdrop { z-index: 10000 !important; }

</style>

<div class="dashboard-container">
    <div class="glass-box" style="min-height: 700px;">
        <div class="approval-header">
            <h2 style="margin: 0; color: #2c3e50;"><i class="fa-solid fa-signature"></i> 사내 전자결재</h2>
            <button class="btn-new-draft" onclick="openDraftModal()"><i class="fa-solid fa-pen-nib"></i> 새 결재 상신</button>
        </div>

        <div class="nav-tabs">
            <div class="nav-tab active" id="tab-pending" onclick="switchTab('pending')">내 결재함 (수신)</div>
            <div class="nav-tab" id="tab-draft" onclick="switchTab('draft')">기안 진행함 (발신)</div>
            <div class="nav-tab" id="tab-completed" onclick="switchTab('completed')">결재/수신 완료함 (보관)</div>
        </div>

        <div class="search-wrap">
            <input type="text" id="searchInput" class="search-input" placeholder="제목, 이름, 문서종류 검색..." onkeyup="handleSearch()">
        </div>

        <table class="approval-table">
            <thead id="thead-data"></thead>
            <tbody id="tbody-data"></tbody>
        </table>
        <div id="pagination" style="text-align:center; margin-top:25px;"></div>
    </div>
</div>

<div id="draftModal" class="modal">
    <div id="draftModalContent" class="modal-content">
        <span onclick="document.getElementById('draftModal').style.display='none'" style="position:absolute; right:25px; top:20px; cursor:pointer; font-size:24px; color:#aaa;">&times;</span>
        <h3 id="draftModalTitle" style="color:#4a90e2; margin-top:0; margin-bottom:20px;"><i class="fa-solid fa-pen-to-square"></i> 기안서 상신</h3>
        
        <div id="draft-step-1">
            <div class="form-group">
                <label>문서 종류</label>
                <select id="draftType" class="form-control" onchange="toggleReceiverMode()">
                    <option value="기안서">기안서 (일반)</option>
                    <option value="보고서">보고서</option>
                    <option value="업무일지">업무일지</option>
                    <option value="회의록">회의록</option>
                    <option value="지출결의서">지출결의서</option>
                    <option value="휴가원">휴가원</option>
                    <option value="퇴직원">퇴직원</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>문서 제목</label>
                <input type="text" id="draftTitle" class="form-control" placeholder="예: 2026년 4월 비품 구매 품의" required>
            </div>

            <div id="approval-line" style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;">
                    <label>1차 결재자 (필수)</label>
                    <select id="app1" class="form-control">
                        <option value="">선택하세요</option>
                        <option value="전결">전결 (1차 결재 생략)</option>
                        {% for u in user_list %}<option value="{{ u }}">{{ u }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>2차 결재자 (선택)</label>
                    <select id="app2" class="form-control">
                        <option value="">없음 (1차 승인 시 즉시 완료)</option>
                        {% for u in user_list %}<option value="{{ u }}">{{ u }}</option>{% endfor %}
                    </select>
                </div>
            </div>

            <div id="receiver-line" class="form-group" style="display:none;">
                <label>수신자 지정 (여러 명 체크 가능)</label>
                <div class="receiver-box">
                    {% for u in user_list %}
                    <label><input type="checkbox" class="recv-cb" value="{{ u }}"> {{ u }}</label>
                    {% endfor %}
                </div>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-paperclip"></i> 증빙 파일 첨부</label>
                <input type="file" id="draftFile" class="form-control">
            </div>

            <button type="button" onclick="goToStep2()" style="width:100%; background:#4a90e2; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; font-size:1.1em; cursor:pointer; margin-top:10px;">
                양식 폼 열기 (문서 작성) <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

        <div id="draft-step-2" style="display:none;">
            <div style="margin-bottom: 10px; font-weight: bold; color: #495057;">본문 작성 (표/이미지 첨부 가능)</div>
            <div id="summernote"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button type="button" onclick="goToStep1()" style="flex:1; background:#868e96; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer;">
                    <i class="fa-solid fa-arrow-left"></i> 이전으로
                </button>
                <button type="button" onclick="submitApproval()" style="flex:2; background:#28a745; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; font-size:1.1em; cursor:pointer;">
                    <i class="fa-solid fa-paper-plane"></i> 최종 송신
                </button>
            </div>
        </div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div id="detailModalContent" class="modal-content">
        <span onclick="document.getElementById('detailModal').style.display='none'" style="position:absolute; right:25px; top:20px; cursor:pointer; font-size:24px; color:#aaa;">&times;</span>
        <h3 id="dt_type" style="color:#868e96; margin-top:0; margin-bottom:5px; font-size:1rem;"></h3>
        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #dee2e6; padding-bottom:10px; margin-bottom:20px; font-size:0.9em; color:#495057;">
            <div><strong>현재 상태:</strong> <span id="dt_status" class="status-badge"></span></div>
        </div>
        <div class="detail-box" id="dt_dynamic_box" style="padding: 40px;"></div>
        <div id="actionArea" style="display:none; text-align:center; margin-top:30px; border-top:1px dashed #dee2e6; padding-top:20px;">
            <button class="action-btn btn-reject" onclick="processApproval('reject')"><i class="fa-solid fa-xmark"></i> 반려</button>
            <button class="action-btn btn-approve" onclick="processApproval('approve')" style="margin-left:15px;"><i class="fa-solid fa-check"></i> 결재 승인</button>
        </div>
        <input type="hidden" id="currentDocId">
    </div>
</div>

<script>
const currentUser = '{{ current_user }}';
const docsData = {
    'pending': {{ pending_docs | tojson | safe }},
    'draft': {{ my_drafts | tojson | safe }},
    'completed': {{ completed_docs | tojson | safe }}
};
const nextDocId = {{ next_id }};

let currentTab = 'pending';
let currentPage = 1;
const itemsPerPage = 10;
let searchTerm = '';

$(document).ready(function() {
    $('#summernote').summernote({
        placeholder: '내용을 작성해주세요.',
        tabsize: 2, 
        height: 800, 
        dialogsInBody: true,
        toolbar: [
            ['style', ['style']], ['font', ['bold', 'underline', 'clear']], ['color', ['color']],
            ['para', ['ul', 'ol', 'paragraph']], ['table', ['table']], ['insert', ['link', 'picture']], ['view', ['fullscreen', 'codeview']]
        ]
    });
    renderTable();
});

function renderTable() {
    const headers = {
        'pending': `<tr><th>종류</th><th>제목</th><th>기안자</th><th>기안일시</th><th>상태</th></tr>`,
        'draft': `<tr><th>종류</th><th>제목</th><th>결재자/수신자</th><th>기안일시</th><th>상태</th></tr>`,
        'completed': `<tr><th>종류</th><th>제목</th><th>기안자</th><th>최종처리일시</th><th>결과</th></tr>`
    };
    document.getElementById('thead-data').innerHTML = headers[currentTab];

    const data = docsData[currentTab].filter(doc => 
        doc.title.toLowerCase().includes(searchTerm) || 
        doc.drafter.toLowerCase().includes(searchTerm) ||
        doc.doc_type.toLowerCase().includes(searchTerm)
    );

    const totalPages = Math.ceil(data.length / itemsPerPage) || 1;
    const start = (currentPage - 1) * itemsPerPage;
    const paginatedData = data.slice(start, start + itemsPerPage);

    let html = '';
    if(paginatedData.length === 0) {
        html = `<tr><td colspan="5" style="text-align:center; padding:30px; color:#adb5bd;">검색된 문서가 없습니다.</td></tr>`;
    } else {
        paginatedData.forEach(doc => {
            const approverText = doc.receivers ? doc.receivers.substring(0,15) + (doc.receivers.length > 15 ? '...' : '') : `${doc.approver_1} / ${doc.approver_2 || '전결'}`;
            const displayCol = currentTab === 'pending' ? doc.drafter : 
                               currentTab === 'draft' ? approverText : doc.drafter;
            const dateCol = currentTab === 'completed' ? doc.updated_at.substring(0,16) : doc.created_at.substring(0,16);

            html += `<tr onclick="openDetailModal(${doc.id})">
                <td><span style="font-weight:bold; color:#4a90e2;">[${doc.doc_type}]</span></td>
                <td>${doc.title}</td>
                <td style="font-size:0.9em;">${displayCol}</td>
                <td style="color:#868e96; font-size:0.9em;">${dateCol}</td>
                <td><span class="status-badge st-${doc.status}">${doc.status}</span></td>
            </tr>`;
        });
    }
    document.getElementById('tbody-data').innerHTML = html;

    let pageHtml = '';
    for(let i=1; i<=totalPages; i++) {
        pageHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
    }
    document.getElementById('pagination').innerHTML = pageHtml;
}

function switchTab(tab) {
    currentTab = tab; currentPage = 1;
    document.getElementById('searchInput').value = ''; searchTerm = '';
    ['pending', 'draft', 'completed'].forEach(t => document.getElementById('tab-' + t).classList.toggle('active', t === tab));
    renderTable();
}

function handleSearch() { searchTerm = document.getElementById('searchInput').value.toLowerCase(); currentPage = 1; renderTable(); }
function changePage(p) { currentPage = p; renderTable(); }

// 상신 버튼 클릭 시 (1단계: 짧은 모달)
function openDraftModal() {
    const modalContent = document.getElementById('draftModalContent');
    modalContent.style.height = 'auto'; // 내용에 맞게 짧게
    modalContent.style.maxHeight = '80vh';

    document.getElementById('draftType').value = '기안서';
    document.getElementById('draftTitle').value = '';
    document.getElementById('draftFile').value = '';
    document.querySelectorAll('.recv-cb').forEach(cb => cb.checked = false);
    
    toggleReceiverMode();
    document.getElementById('draft-step-1').style.display = 'block';
    document.getElementById('draft-step-2').style.display = 'none';
    document.getElementById('draftModal').style.display = 'block';
}

function toggleReceiverMode() {
    const type = document.getElementById('draftType').value;
    const isReceiverType = ['보고서', '업무일지', '회의록'].includes(type);
    document.getElementById('approval-line').style.display = isReceiverType ? 'none' : 'flex';
    document.getElementById('receiver-line').style.display = isReceiverType ? 'block' : 'none';
}

function goToStep1() {
    const modalContent = document.getElementById('draftModalContent');
    modalContent.style.height = 'auto';
    modalContent.style.maxHeight = '80vh';
    document.getElementById('draft-step-1').style.display = 'block';
    document.getElementById('draft-step-2').style.display = 'none';
}

// 2단계 이동 시 (양식 폼: 긴 모달)
function goToStep2() {
    const title = document.getElementById('draftTitle').value;
    const type = document.getElementById('draftType').value;
    const app1 = document.getElementById('app1').value;
    const app2 = document.getElementById('app2').value || '';
    const todayStr = new Date().toISOString().split('T')[0];
    const docYear = todayStr.substring(0, 4);

    if (!title) return alert("문서 제목을 입력하세요.");
    if (!['보고서', '업무일지', '회의록'].includes(type) && !app1) return alert("1차 결재자는 필수입니다.");

    // 모달 크기 확장 (긴 모달)
    const modalContent = document.getElementById('draftModalContent');
    modalContent.style.height = '80vh';
    modalContent.style.maxHeight = '80vh';

    const labelDrafter = (type === '보고서') ? '보고자' : '기안자';
    const labelDocNum = (type === '보고서') ? '보고서번호' : '문서번호';
    const paddedId = String(nextDocId).padStart(4, '0');
    const expectedDocNum = `${docYear}-${type}-${paddedId}`;

    let headerHtml = `<div style="text-align: center; margin-bottom: 30px;"><h1 style="margin: 0; padding: 10px; font-size: 32px; letter-spacing: 5px;">${type}</h1></div>`;

    if (['보고서', '업무일지', '회의록'].includes(type)) {
        const recs = Array.from(document.querySelectorAll('.recv-cb:checked')).map(cb => cb.value);
        headerHtml += `
        <table style="width: 100%; border: none; margin-bottom: 20px;">
            <tr>
                <td style="width: 40%; vertical-align: top; padding: 0;">
                    <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
                        <tr><th style="background: #f8f9fa; padding: 8px; width: 35%;">${labelDrafter}</th><td style="padding: 8px;">${currentUser}</td></tr>
                        <tr><th style="background: #f8f9fa; padding: 8px;">기안일자</th><td style="padding: 8px;">${todayStr}</td></tr>
                        <tr><th style="background: #f8f9fa; padding: 8px;">${labelDocNum}</th><td style="padding: 8px;">${expectedDocNum}</td></tr>
                    </table>
                </td>
                <td style="width: 20%;"></td>
                <td style="width: 40%; vertical-align: top; text-align: right; padding: 0;">
                    <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
                        <tr><th style="background: #f8f9fa; padding: 8px; width: 30%;">수신자</th><td style="padding: 8px; line-height: 1.4;">${recs.join(', ')}</td></tr>
                    </table>
                </td>
            </tr>
        </table>`;
    } else {
        headerHtml += `
        <table style="width: 100%; border: none; margin-bottom: 20px;">
            <tr>
                <td style="width: 40%; vertical-align: top; border: none; padding: 0;">
                    <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
                        <tr><th style="background: #f8f9fa; padding: 8px; width: 35%;">${labelDrafter}</th><td style="padding: 8px;">${currentUser}</td></tr>
                        <tr><th style="background: #f8f9fa; padding: 8px;">기안일자</th><td style="padding: 8px;">${todayStr}</td></tr>
                        <tr><th style="background: #f8f9fa; padding: 8px;">${labelDocNum}</th><td style="padding: 8px;">${expectedDocNum}</td></tr>
                    </table>
                </td>
                <td style="width: 20%; border: none;"></td>
                <td style="width: 40%; vertical-align: top; text-align: right; border: none; padding: 0;">
                    <table border="1" style="width: 100%; border-collapse: collapse; text-align: center;">
                        <tr><th rowspan="2" style="background: #f8f9fa; width: 10%;">결<br><br>재</th><th style="background: #f8f9fa; padding: 4px; width: 30%;">기안</th><th style="background: #f8f9fa; padding: 4px; width: 30%;">1차 승인</th><th style="background: #f8f9fa; padding: 4px; width: 30%;">2차 승인</th></tr>
                        <tr><td id="stamp_drafter" style="height: 70px; vertical-align: middle;">${currentUser}</td><td id="stamp_app1" style="height: 70px; vertical-align: middle;">${app1}</td><td id="stamp_app2" style="height: 70px; vertical-align: middle;">${app2}</td></tr>
                    </table>
                </td>
            </tr>
        </table>`;
    }

    headerHtml += `<table border="1" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;"><tr><th style="background: #f8f9fa; padding: 12px; width: 15%; text-align: center;">제 목</th><td style="padding: 12px; font-size: 1.1em;"><b>${title}</b></td></tr></table><br>`;

    const fileInput = document.getElementById('draftFile');
    const displayFileName = fileInput.files.length > 0 ? `<i class="fa-solid fa-paperclip"></i> ${fileInput.files[0].name}` : '첨부 없음';

    let bodyHtml = `
    <table border="1" style="width:100%; border-collapse:collapse; text-align:left;">
        <tr><th style="background:#f8f9fa; padding:10px; width:20%;">상세내용</th><td style="padding:10px; height: 300px; vertical-align: top;"></td></tr>
        <tr><th style="background:#f8f9fa; padding:10px;">비고</th><td style="padding:10px;"></td></tr>
        <tr><th style="background:#f8f9fa; padding:10px;">첨부파일</th><td style="padding:10px;">${displayFileName}</td></tr>
    </table>`;

    $('#summernote').summernote('code', headerHtml + bodyHtml);
    document.getElementById('draft-step-1').style.display = 'none';
    document.getElementById('draft-step-2').style.display = 'block';
}

async function submitApproval() {
    const type = document.getElementById('draftType').value;
    const title = document.getElementById('draftTitle').value;
    let formData = new FormData();
    formData.append('doc_type', type);
    formData.append('title', title);
    formData.append('doc_data', JSON.stringify({ "본문": $('#summernote').summernote('code') }));
    
    if (['보고서', '업무일지', '회의록'].includes(type)) {
        const recs = Array.from(document.querySelectorAll('.recv-cb:checked')).map(cb => cb.value);
        formData.append('receivers', recs.join(','));
        formData.append('approver_1', ''); formData.append('approver_2', '');
    } else {
        formData.append('approver_1', document.getElementById('app1').value);
        formData.append('approver_2', document.getElementById('app2').value);
        formData.append('receivers', '');
    }

    let fileInput = document.getElementById('draftFile');
    if (fileInput.files.length > 0) formData.append('file', fileInput.files[0]);

    try {
        const res = await fetch('/approval/submit', { method: 'POST', body: formData });
        const d = await res.json();
        alert(d.message); if(res.ok) location.reload();
    } catch(e) { alert("상신 중 오류가 발생했습니다."); }
}

async function openDetailModal(docId) {
    try {
        const res = await fetch(`/approval/detail/${docId}`);
        if(!res.ok) return alert("문서를 불러올 수 없습니다.");
        const doc = await res.json();
        const parsed = doc.doc_data ? JSON.parse(doc.doc_data) : {};

        const modalContent = document.getElementById('detailModalContent');
        modalContent.style.height = '90vh'; // 상세보기는 길게
        modalContent.style.maxHeight = '90vh';

        const docYear = doc.created_at.substring(0, 4);
        const docNumberStr = `${docYear}-${doc.doc_type}-${String(doc.id).padStart(4, '0')}`;
        const docDate = doc.created_at.substring(5, 10);

        document.getElementById('currentDocId').value = doc.id;
        document.getElementById('dt_type').innerText = `[문서번호: ${docNumberStr}]`;
        document.getElementById('dt_status').innerText = doc.status;
        document.getElementById('dt_status').className = `status-badge st-${doc.status}`;

        let bodyHtml = (parsed['본문'] || "").replace(/자동채번/g, docNumberStr);
        if(doc.filename) {
            const safeName = doc.filepath ? doc.filepath.split('/').pop() : doc.filename;
            const fileLinkHtml = `<a href="/uploads/${safeName}" target="_blank" style="font-weight:bold; color:#4a90e2; text-decoration:underline;"><i class="fa-solid fa-paperclip"></i> ${doc.filename}</a>`;
            bodyHtml = bodyHtml.replace(new RegExp(`<i class="fa-solid fa-paperclip"></i> ${doc.filename}`, 'g'), fileLinkHtml);
            bodyHtml = bodyHtml.replace('상신 시 자동 첨부됨', fileLinkHtml);
        }

        const box = document.getElementById('dt_dynamic_box');
        box.innerHTML = `<div>${bodyHtml}</div>`;

        const stampStyle = "color:#e03131; border:3px solid #e03131; padding:5px 10px; border-radius:5px; display:inline-block; line-height:1.2; font-weight:bold; background:white; letter-spacing:2px; font-size: 0.9em; margin-top:5px;";
        const drafterNodes = document.querySelectorAll('#stamp_drafter');
        if (drafterNodes.length > 1) {
            drafterNodes[0].innerHTML = doc.drafter;
            drafterNodes[1].innerHTML = `<div style="${stampStyle}">${doc.drafter}<br><span style="font-size:0.7em; letter-spacing:0; font-weight:normal;">${docDate}</span></div>`;
        } else if (drafterNodes.length === 1) {
            drafterNodes[0].innerHTML = `<div style="${stampStyle}">${doc.drafter}<br><span style="font-size:0.7em; letter-spacing:0; font-weight:normal;">${docDate}</span></div>`;
        }

        ['app1', 'app2'].forEach((key, idx) => {
            const td = document.getElementById(`stamp_${key}`);
            const appName = doc[`approver_${idx+1}`];
            if(td && appName) {
                if(appName === '전결') td.innerHTML = `<div style="${stampStyle}">전결<br><span style="font-size:0.7em; letter-spacing:0; font-weight:normal;">-</span></div>`;
                else if(doc.status === (idx === 0 ? '1차승인' : '완료') || doc.status === '완료') {
                    let d = parsed[`${key}_date`] || doc.updated_at.substring(5,10);
                    td.innerHTML = `<div style="${stampStyle}">${appName}<br><span style="font-size:0.7em; letter-spacing:0; font-weight:normal;">${d.substring(5,10)}</span></div>`;
                }
            }
        });

        const isApp1 = (doc.status === '대기' && doc.approver_1 === currentUser);
        const isApp2 = (doc.status === '1차승인' && doc.approver_2 === currentUser);
        document.getElementById('actionArea').style.display = (isApp1 || isApp2) ? 'block' : 'none';
        document.getElementById('detailModal').style.display = 'block';
    } catch(e) {}
}

async function processApproval(actionStr) {
    const docId = document.getElementById('currentDocId').value;
    if(!confirm(actionStr === 'approve' ? "승인하시겠습니까?" : "반려하시겠습니까?")) return;
    try {
        const res = await fetch(`/approval/action/${docId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: actionStr }) });
        if(res.ok) { alert("처리되었습니다."); location.reload(); }
    } catch(e) {}
}
</script>
