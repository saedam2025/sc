{% extends 'base.html' %}

{% block content %}
<div class="user-mgmt-container" style="max-width: 1100px; margin: 0 auto; padding: 20px;">
    <h2 style="color: #4a90e2; border-bottom: 2px solid #4a90e2; padding-bottom: 10px; margin-bottom: 30px;">👤 사내 회원 관리 시스템</h2>

    <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;">
        
        <div class="registration-box" style="background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
            <h3 style="margin-top: 0;">📝 신규 회원 등록 신청</h3>
            <p style="font-size: 0.85em; color: #666;">* 모든 항목을 정확히 입력 후 승인을 기다려주세요.</p>
            <hr style="border: 0.5px solid #eee; margin: 20px 0;">
            
            <form id="registerForm">
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">기본 정보</label>
                    <input type="text" id="name" placeholder="성명" required style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
                    <input type="password" id="password" placeholder="접속 암호 (4자리)" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">신청 직급</label>
                    <select id="position" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
                        <option value="사원">사원</option>
                        <option value="팀장">팀장</option>
                        <option value="실장">실장</option>
                        <option value="이사">이사</option>
                        <option value="대표이사">대표이사</option>
                        <option value="센터장">센터장</option>
                        <option value="전담코디">전담코디</option>
                        <option value="안전코디">안전코디</option>
                        <option value="계약직">계약직</option>
                    </select>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">상세 정보</label>
                    <input type="text" id="rrn" placeholder="주민번호 (000000-0000000)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
                    <input type="text" id="phone" placeholder="전화번호" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
                    <input type="text" id="address" placeholder="주소" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
                </div>

                <textarea id="note" placeholder="기타 사항" style="width:100%; height:80px; padding:10px; border:1px solid #ddd; border-radius:5px; margin-bottom:20px;"></textarea>
                
                <button type="button" onclick="submitRegistration()" style="width:100%; background:#4a90e2; color:white; border:none; padding:15px; border-radius:8px; font-weight:bold; cursor:pointer;">등록 신청하기</button>
            </form>
        </div>

        <div class="admin-box" style="background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin: 0;">✅ 승인 대기 명단</h3>
                <div id="admin-login" style="font-size: 0.8em; background:#f8f9fa; padding:10px; border-radius:8px;">
                    <input type="text" id="admin_name" placeholder="관리자명" style="width:70px; border:1px solid #ccc;">
                    <input type="password" id="admin_pass" placeholder="암호" style="width:70px; border:1px solid #ccc;">
                </div>
            </div>
            <hr style="border: 0.5px solid #eee; margin: 20px 0;">

            <table style="width:100%; border-collapse:collapse; text-align:left;">
                <thead>
                    <tr style="background:#f4f7fc; color:#555;">
                        <th style="padding:12px;">성명</th>
                        <th style="padding:12px;">신청직급</th>
                        <th style="padding:12px;">상태</th>
                        <th style="padding:12px;">작업</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// 회원 등록 신청
async function submitRegistration() {
    const data = {
        name: document.getElementById('name').value,
        password: document.getElementById('password').value,
        position: document.getElementById('position').value,
        rrn: document.getElementById('rrn').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        note: document.getElementById('note').value
    };

    if(!data.name || !data.password) return alert("이름과 암호는 필수입니다.");

    const res = await fetch('/user/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const result = await res.json();
    alert(result.message);
    if(res.ok) location.reload();
}

// 승인 대기 리스트 로드
async function loadPendingUsers() {
    const res = await fetch('/user/list');
    const users = await res.json();
    const tbody = document.getElementById('user-table-body');
    tbody.innerHTML = '';

    users.forEach((user, index) => {
        if(user.승인상태 === '대기') {
            tbody.innerHTML += `
                <tr style="border-bottom:1px solid #eee;">
                    <td style="padding:12px;">${user.이름}</td>
                    <td style="padding:12px;">${user.직급}</td>
                    <td style="padding:12px;"><span style="color:orange;">대기</span></td>
                    <td style="padding:12px;">
                        <button onclick="approve(${index}, '${user.직급}')" style="background:#28a745; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">승인</button>
                    </td>
                </tr>
            `;
        }
    });
}

// 관리자 승인 처리
async function approve(idx, pos) {
    const admin_name = document.getElementById('admin_name').value;
    const admin_pass = document.getElementById('admin_pass').value;

    if(!admin_name || !admin_pass) return alert("관리자 인증이 필요합니다.");

    const res = await fetch('/user/approve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            admin_name: admin_name,
            admin_pass: admin_pass,
            user_idx: idx,
            approved_position: pos
        })
    });
    const result = await res.json();
    alert(result.message);
    if(res.ok) loadPendingUsers();
}

window.onload = loadPendingUsers;
</script>
{% endblock %}
