{% extends 'base.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/user_mgmt.css') }}">
<style>
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
    .status-pending { background: #fff4e6; color: #d9480f; }
    .status-approved { background: #ebfbee; color: #2b8a3e; }
    .action-btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; font-size: 0.85em; }
    .btn-edit { background: #4a90e2; color: white; }
    .btn-delete { background: #fa5252; color: white; }
    .btn-approve { background: #28a745; color: white; }
</style>
{% endblock %}

{% block content %}
<div class="user-mgmt-container">
    <div class="mgmt-header">
        <h2><i class="fa-solid fa-users-gear"></i> 회원 및 권한 관리 시스템</h2>
        <p>새담 구성원 등록 신청 승인 및 기존 회원 정보를 관리합니다.</p>
    </div>

    <div class="mgmt-grid" style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; margin-top: 20px;">
        <div class="mgmt-card registration-form">
            <h3><i class="fa-solid fa-pen-to-square"></i> 신규 가입 신청</h3>
            <hr>
            <form id="regForm">
                <div class="input-group">
                    <input type="text" id="name" placeholder="성명" required>
                    <input type="password" id="password" placeholder="접속 비밀번호 (4자리)" required>
                    <select id="position">
                        <option value="사원">사원</option>
                        <option value="팀장">팀장</option>
                        <option value="실장">실장</option>
                        <option value="이사">이사</option>
                        <option value="대표이사">대표이사</option>
                        <option value="센터장">센터장</option>
                    </select>
                    <input type="text" id="phone" placeholder="연락처">
                    <textarea id="note" placeholder="기타 특이사항" style="width:100%; height:60px; padding:10px; border-radius:6px; border:1px solid #ddd;"></textarea>
                </div>
                <button type="button" class="btn-primary" onclick="registerUser()" style="width:100%; background:#4a90e2; color:white; padding:12px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">등록 신청하기</button>
            </form>
        </div>

        <div class="mgmt-card approval-list">
            <h3><i class="fa-solid fa-clock-rotate-left"></i> 승인 대기 명단</h3>
            <hr>
            <table class="approve-table">
                <thead>
                    <tr>
                        <th>이름</th><th>신청직급</th><th>상태</th><th>작업</th>
                    </tr>
                </thead>
                <tbody id="pending-list-body"></tbody>
            </table>
        </div>
    </div>

    <div class="mgmt-card" style="margin-top: 30px;">
        <h3><i class="fa-solid fa-list-ul"></i> 기존 회원 목록 관리</h3>
        <hr>
        <table class="approve-table">
            <thead>
                <tr>
                    <th>이름</th><th>직급</th><th>레벨</th><th>연락처</th><th>상태</th><th>관리</th>
                </tr>
            </thead>
            <tbody id="member-list-body"></tbody>
        </table>
    </div>
</div>

<script>
async function loadAllUsers() {
    const res = await fetch('/user/list');
    const users = await res.json();
    
    const pendingBody = document.getElementById('pending-list-body');
    const memberBody = document.getElementById('member-list-body');
    
    pendingBody.innerHTML = '';
    memberBody.innerHTML = '';

    users.forEach((user, idx) => {
        if(user.승인상태 === '대기') {
            pendingBody.innerHTML += `
                <tr>
                    <td>${user.이름}</td>
                    <td>${user.직급}</td>
                    <td><span class="status-badge status-pending">대기</span></td>
                    <td><button onclick="approveUser(${idx}, '${user.직급}')" class="action-btn btn-approve">승인</button></td>
                </tr>`;
        } else {
            memberBody.innerHTML += `
                <tr>
                    <td><strong>${user.이름}</strong></td>
                    <td>${user.직급}</td>
                    <td>Lv.${user.레벨}</td>
                    <td>${user.전화번호 || '-'}</td>
                    <td><span class="status-badge status-approved">정상</span></td>
                    <td>
                        <button onclick="editUser(${idx}, '${user.이름}', '${user.직급}')" class="action-btn btn-edit">수정</button>
                        <button onclick="deleteUser(${idx})" class="action-btn btn-delete">삭제</button>
                    </td>
                </tr>`;
        }
    });
}

async function registerUser() {
    const data = {
        name: document.getElementById('name').value,
        password: document.getElementById('password').value,
        position: document.getElementById('position').value,
        phone: document.getElementById('phone').value,
        note: document.getElementById('note').value
    };
    if(!data.name || !data.password) return alert("이름과 암호를 입력해주세요.");

    const res = await fetch('/user/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const result = await res.json();
    alert(result.message);
    if(res.ok) location.reload();
}

// 공통 인증 창 (암호만 입력)
function getAdminPass() {
    return prompt("관리자(이사 이상) 암호를 입력하세요.\n(초기 설정 시 슈퍼바이저 암호 입력)");
}

async function approveUser(idx, pos) {
    const adminPass = getAdminPass();
    if(!adminPass) return;

    const res = await fetch('/user/approve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ admin_pass: adminPass, user_idx: idx, approved_position: pos })
    });
    const result = await res.json();
    alert(result.message);
    if(res.ok) loadAllUsers();
}

async function editUser(idx, name, currentPos) {
    const newPos = prompt(`${name} 님의 새로운 직급을 입력하세요:\n(사원, 팀장, 실장, 이사, 대표이사 등)`, currentPos);
    if(!newPos || newPos === currentPos) return;

    const adminPass = getAdminPass();
    if(!adminPass) return;

    const res = await fetch('/user/approve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ admin_pass: adminPass, user_idx: idx, approved_position: newPos })
    });
    const result = await res.json();
    alert(result.message);
    if(res.ok) loadAllUsers();
}

async function deleteUser(idx) {
    if(!confirm("정말로 이 회원을 삭제하시겠습니까?")) return;

    const adminPass = getAdminPass();
    if(!adminPass) return;

    const res = await fetch('/user/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ admin_pass: adminPass, user_idx: idx })
    });
    const result = await res.json();
    alert(result.message);
    if(res.ok) loadAllUsers();
}

window.onload = loadAllUsers;
</script>
{% endblock %}
