{% extends 'base.html' %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/user_mgmt.css') }}">
{% endblock %}

{% block content %}
<div class="mgmt-header">
    <h2><i class="fa-solid fa-users-gear"></i> 회원 및 권한 관리</h2>
    <p>신규 가입 신청 승인 및 기존 회원의 정보를 관리합니다.</p>
</div>

<div class="mgmt-card">
    <h3><i class="fa-solid fa-user-plus"></i> 신규 가입 신청</h3>
    <div class="reg-form">
        <input type="text" id="reg_name" placeholder="이름">
        <input type="password" id="reg_pass" placeholder="비밀번호">
        <input type="text" id="reg_rrn" placeholder="주민번호 (예: 800101-1)">
        <select id="reg_pos">
            <option value="사원">사원</option>
            <option value="팀장">팀장</option>
            <option value="실장">실장</option>
            <option value="계약직">계약직</option>
        </select>
        <button class="action-btn btn-approve" onclick="registerUser()">신청하기</button>
    </div>
</div>

<div class="mgmt-card">
    <h3><i class="fa-solid fa-list-check"></i> 전체 회원 목록</h3>
    <table class="approve-table">
        <thead>
            <tr>
                <th>이름</th>
                <th>직급(레벨)</th>
                <th>주민번호</th>
                <th>상태</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody id="user-list-body">
            </tbody>
    </table>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // 페이지 로드 시 목록 불러오기
    document.addEventListener('DOMContentLoaded', loadUsers);

    async function loadUsers() {
        const res = await fetch('/user/list');
        const users = await res.json();
        const body = document.getElementById('user-list-body');
        body.innerHTML = '';

        users.forEach((user, idx) => {
            const isPending = user['승인상태'] === '대기';
            body.innerHTML += `
                <tr>
                    <td>${user['이름']}</td>
                    <td>${user['직급']}(${user['레벨']})</td>
                    <td>${user['주민번호'] || '-'}</td>
                    <td><span class="status-badge ${isPending ? 'status-wait' : ''}">${user['승인상태']}</span></td>
                    <td>
                        ${isPending ? 
                            `<button class="action-btn btn-approve" onclick="approveUser(${idx})">승인</button>` : 
                            `<button class="action-btn btn-edit" onclick="updateUser(${idx})">수정</button>`
                        }
                        <button class="action-btn btn-delete" onclick="deleteUser(${idx})">삭제</button>
                    </td>
                </tr>
            `;
        });
    }

    // 1) 신규 등록
    async function registerUser() {
        const data = {
            name: document.getElementById('reg_name').value,
            password: document.getElementById('reg_pass').value,
            rrn: document.getElementById('reg_rrn').value,
            position: document.getElementById('reg_pos').value
        };
        const res = await fetch('/user/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        alert(result.message);
        loadUsers();
    }

    // 2) 수정 (관리자 인증 팝업)
    async function updateUser(idx) {
        const adminName = prompt("관리자 성함을 입력하세요:");
        if(!adminName) return;
        const adminPass = prompt("관리자 암호를 입력하세요:");
        if(!adminPass) return;

        const newPos = prompt("변경할 직급을 입력하세요 (사원/팀장/실장/이사 등):");
        if(!newPos) return;

        const data = {
            user_idx: idx,
            admin_name: adminName,
            admin_pass: adminPass,
            edit_position: newPos
        };

        const res = await fetch('/user/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        alert(result.message);
        loadUsers();
    }

    // 3) 삭제 (관리자 인증 팝업)
    async function deleteUser(idx) {
        if(!confirm("정말로 삭제하시겠습니까?")) return;
        
        const adminName = prompt("삭제 권한 확인을 위해 관리자 성함을 입력하세요:");
        const adminPass = prompt("관리자 암호를 입력하세요:");

        const res = await fetch('/user/delete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                user_idx: idx,
                admin_name: adminName,
                admin_pass: adminPass
            })
        });
        const result = await res.json();
        alert(result.message);
        loadUsers();
    }

    // 4) 승인 (관리자 인증 팝업)
    async function approveUser(idx) {
        const adminName = prompt("승인 권한 확인을 위해 관리자 성함을 입력하세요:");
        const adminPass = prompt("관리자 암호를 입력하세요:");
        const pos = prompt("승인할 직급을 입력하세요 (예: 사원):", "사원");

        const res = await fetch('/user/approve', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                user_idx: idx,
                admin_name: adminName,
                admin_pass: adminPass,
                approved_position: pos
            })
        });
        const result = await res.json();
        alert(result.message);
        loadUsers();
    }
</script>
{% endblock %}
