<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://www.saedam.org/img_sub/favicon.ico" type="image/x-icon">
    <title>계약 목록 | 새담청소년교육문화원</title>
    <style>
        :root {
            --saedam-blue: #004ea2;
            --saedam-navy: #002c63;
            --bg-light: #f4f7fa;
            --border-color: #d1d8e0;
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: var(--saedam-navy);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 메인 컨테이너 - 모바일 대응을 위한 flex-direction 설정 */
        .list-wrapper {
            width: 95%;
            max-width: 900px;
            background: #ffffff;
            display: flex;
            flex-direction: row; /* 기본 가로 배치 */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-radius: 0;
            overflow: hidden;
            margin: 20px auto;
        }

        /* 왼쪽 사이드 바 (모바일 상단) */
        .list-side-bar {
            flex: 0.8;
            background: var(--saedam-blue);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            text-align: center;
            background-image: linear-gradient(rgba(0, 78, 162, 0.85), rgba(0, 78, 162, 0.85)), 
                              url('https://images.unsplash.com/photo-1454165833762-02ad50c797e0?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
        }

        .list-side-bar h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .list-side-bar p {
            font-size: 0.95rem;
            opacity: 0.9;
            line-height: 1.6;
            word-break: keep-all;
        }

        /* 오른쪽 리스트 영역 (모바일 하단) */
        .list-content-area {
            flex: 1.5;
            padding: 50px;
            box-sizing: border-box;
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        .header-info {
            margin-bottom: 30px;
            border-bottom: 2px solid var(--saedam-navy);
            padding-bottom: 15px;
        }

        .header-info span {
            font-size: 1rem;
            color: var(--saedam-blue);
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }

        .header-info h2 {
            font-size: 1.5rem;
            color: var(--saedam-navy);
            margin: 0;
            font-weight: 800;
        }

        /* 계약 카드 스타일 */
        .contract-item {
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .contract-item:hover {
            background: #f8f9fb;
            border-color: var(--saedam-blue);
        }

        .info-box {
            flex: 1;
            padding-right: 15px;
        }

        .school-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--saedam-navy);
            display: block;
            margin-bottom: 5px;
        }

        .dept-name {
            font-size: 0.9rem;
            color: #666;
        }

        /* 작성하기 버튼 (광택 애니메이션 유지) */
        .btn-write {
            position: relative;
            display: inline-block;
            text-decoration: none;
            padding: 12px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 4px;
            white-space: nowrap;
            color: #ffffff;
            background-color: var(--saedam-navy);
            border: none;
            z-index: 1;
            overflow: hidden;
            text-align: center;
        }

        .btn-write::before {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.4) 50%, 
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            z-index: 2;
            animation: shine-loop 2s infinite;
        }

        @keyframes shine-loop {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        .btn-write:hover {
            background-color: var(--saedam-blue);
            transition: background-color 0.3s;
        }

        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: #bbb;
            font-size: 0.9rem;
            border: 1px dashed var(--border-color);
        }

        .footer-info {
            margin-top: 30px;
            padding-top: 20px;
            font-size: 0.75rem;
            color: #aaa;
            text-align: center;
        }

        /* [모바일 대응 미디어 쿼리] */
        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                height: auto;
            }

            .list-wrapper {
                flex-direction: column; /* 세로 배치 */
                width: 92%;
                margin: 30px auto;
            }

            .list-side-bar {
                padding: 30px 20px;
            }

            .list-side-bar h2 {
                font-size: 1.5rem;
            }

            .list-content-area {
                padding: 30px 20px;
            }

            .header-info h2 {
                font-size: 1.3rem;
            }

            .contract-item {
                flex-direction: column; /* 카드 내부 요소 세로 배치 */
                align-items: flex-start;
                gap: 15px;
            }

            .info-box {
                padding-right: 0;
            }

            .btn-write {
                width: 100%; /* 모바일에서 버튼 꽉 차게 */
                box-sizing: border-box;
            }
        }
    </style>
</head>

<script>
    // 보안 스크립트 유지
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        alert('보안 정책에 따라 우클릭을 사용할 수 없습니다.');
    });

    document.onkeydown = function(e) {
        if (e.keyCode == 123) return false;
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) return false;
        if (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83)) return false;
    };

    document.onselectstart = function() {
        return false;
    };
</script>

<body>

    <div class="list-wrapper">
        <div class="list-side-bar">
            <h2>CONTRACT</h2>
            <p>본인의 소중한 권리 보호를 위해<br>계약 내용을 꼼꼼히 확인해 주세요.</p>
        </div>

        <div class="list-content-area">
            <header class="header-info">
                <span>(사)새담청소년교육문화원</span>
                <h2>{{ name }}님 계약대상 목록</h2>
            </header>

            <div class="contract-list">
                {% for item in contracts %}
                <div class="contract-item">
                    <div class="info-box">
                        <span class="school-name">{{ item.수탁학교명 }}</span>
                        <span class="dept-name">계약대상: {{ item.부서명 }}</span>
                    </div>
                    <a href="/contract/contract/{{ item.safe_id }}" class="btn-write">작성하기</a>
                </div>
                {% endfor %}

                {% if not contracts %}
                <div class="empty-state">
                    작성 대기 중인 계약서가 없습니다.
                </div>
                {% endif %}
            </div>

            <footer class="footer-info">
                <div style="text-align: center; margin-bottom: 10px;">
                    <img src="http://www.saedam.org/img/logo01.gif" width="100" alt="로고">
                </div>
                ©SAEDAM Youth Education & Culture Center. All Rights Reserved.
            </footer>
        </div>
    </div>

</body>
</html>
