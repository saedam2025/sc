{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container" style="padding: 20px; background-color: #f4f7fc;">
    <div class="row" style="display: flex; gap: 20px;">
        <div class="col-calendar" style="flex: 7; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <div id='calendar'></div>
        </div>

        <div class="col-today" style="flex: 3; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h3 style="color: #4a90e2; margin-bottom: 20px;">TODAY <span style="font-size: 0.7em; color: #999;">{{ today_str }}</span></h3>
            <div class="today-list">
                {% for event in today_events %}
                <div class="event-card" style="border-left: 5px solid {{ event.color }}; background: #f8f9fa; padding: 15px; margin-bottom: 12px; border-radius: 8px;">
                    <strong style="display: block; margin-bottom: 5px;">{{ event.title }}</strong>
                    {% if event.extendedProps %}
                    <small style="color: #666;">내근: {{ event.extendedProps.inside }}</small>
                    {% endif %}
                </div>
                {% else %}
                <p style="color: #ccc; text-align: center; margin-top: 50px;">오늘 등록된 일정이 없습니다.</p>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'ko',
      headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
      events: {{ events | tojson | safe }},
      eventClick: function(info) {
        // 기존 app_c.py의 상세 확인 기능 연계
        const p = info.event.extendedProps;
        if(p.owner) {
            alert(`[${p.owner} 업무상세]\n내근: ${p.inside}\n외근: ${p.outside}\n회의: ${p.meeting || ''}\n비고: ${p.note}`);
        }
      },
      height: 'auto'
    });
    calendar.render();
  });
</script>
{% endblock %}
