{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container">
    <div class="row">
        <div class="col-calendar" style="flex: 7;">
            <div id='calendar'></div>
        </div>

        <div class="col-today" style="flex: 3; padding-left: 20px;">
            <div class="today-card">
                <h3>TODAY <span style="font-size: 0.8em; color: #666;">{{ today_str }}</span></h3>
                <div class="event-list">
                    {% for event in today_events %}
                    <div class="event-item" style="border-left: 5px solid {{ event.color }};">
                        <strong>{{ event.extendedProps.owner }}</strong><br>
                        <small>내근: {{ event.extendedProps.inside }}</small><br>
                        <small>외근: {{ event.extendedProps.outside }}</small>
                    </div>
                    {% else %}
                    <p>오늘 등록된 일정이 없습니다.</p>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'ko',
      events: {{ events | tojson | safe }},
      eventClick: function(info) {
        // 클릭 시 상세 정보 팝업 (기존 app_c.py의 수정/상세보기 기능 연계 가능)
        let props = info.event.extendedProps;
        alert(`담당자: ${props.owner}\n내근: ${props.inside}\n외근: ${props.outside}\n회의: ${props.meeting}`);
      }
    });
    calendar.render();
  });
</script>

<style>
    .event-item { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
    .col-calendar { background: white; padding: 20px; border-radius: 12px; }
</style>
{% endblock %}
